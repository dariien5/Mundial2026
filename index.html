<style>
  :root {
    --bg:           #f5f7f5;
    --bg2:          #eef1ee;
    --surface:      #ffffff;
    --surface2:     #f0f3f0;
    --surface3:     #e8ece8;
    --border:       #dde3dd;
    --border2:      #c8d2c8;

    --green:        #1a7a3a;
    --green-mid:    #22a04d;
    --green-bright: #1d8f44;
    --green-glow:   rgba(34,160,77,.1);
    --green-pale:   rgba(34,160,77,.08);

    --gold:         #a07820;
    --gold-light:   #c8960a;
    --gold-pale:    rgba(160,120,32,.1);

    --text:         #111f14;
    --text-muted:   #4a6050;
    --text-dim:     #8aa890;

    --red:          #c03030;
    --red-dim:      rgba(192,48,48,.1);

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-xl: 22px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html { background:var(--bg) !important; }
  body {
    font-family:'Inter',sans-serif;
    background:var(--bg) !important;
    color:var(--text) !important;
    min-height:100vh; overflow-x:hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  @media (prefers-color-scheme: dark) {
    html, body { background:var(--bg) !important; color:var(--text) !important; }
  }

  /* ── HERO ── */
  .hero {
    position:relative; padding:calc(28px + env(safe-area-inset-top)) 20px 20px;
    text-align:center; overflow:hidden;
    background:linear-gradient(180deg, #e8f0ea 0%, var(--bg) 100%);
    border-bottom:1px solid var(--border);
  }
  .hero::before {
    content:''; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(34,160,77,.12) 0%, transparent 70%);
  }
  @media (display-mode: standalone) {
    .hero { padding-top: calc(16px + env(safe-area-inset-top)); }
  }
  .hero-badge {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(34,160,77,.12); border:1px solid rgba(34,160,77,.25);
    border-radius:100px; padding:5px 14px;
    font-size:10px; font-weight:700; letter-spacing:.14em; color:var(--green);
    text-transform:uppercase; margin-bottom:12px;
  }
  .hero-badge::before { content:'⚽'; }
  .hero h1 {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(46px,10vw,84px);
    letter-spacing:.04em; line-height:.88;
    color:var(--text); margin-bottom:6px;
  }
  .hero-sub { font-size:11px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; font-weight:600; margin-bottom:18px; }
  .hero-stats { display:flex; justify-content:center; gap:0; }
  .stat { text-align:center; padding:0 16px; position:relative; }
  .stat+.stat::before { content:''; position:absolute; left:0; top:20%; height:60%; width:1px; background:var(--border); }
  .stat-n { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--green-mid); line-height:1; }
  .stat-l { font-size:10px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }

  /* ── COUNTDOWN ── */
  .countdown-block {
    margin:14px auto 20px; max-width:360px;
    background:var(--surface); border:1px solid rgba(34,160,77,.25);
    border-radius:var(--radius-lg); padding:14px 18px; text-align:center;
    box-shadow:0 2px 12px rgba(34,160,77,.08);
  }
  .cd-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; font-weight:700; margin-bottom:4px; }
  .cd-timer { font-family:'Bebas Neue',sans-serif; font-size:48px; color:var(--green-mid); letter-spacing:.06em; line-height:1; margin-bottom:5px; }
  .cd-timer.live { color:var(--red); font-size:28px; }
  .cd-match { font-size:12px; color:var(--text-muted); line-height:1.5; }
  .cd-match strong { color:var(--text); font-weight:700; }
  .cd-channel { display:inline-flex; align-items:center; gap:4px; margin-top:4px; font-size:11px; }

  /* ── TOPBAR ── */
  .topbar {
    padding:10px 14px; display:flex; align-items:center; gap:10px;
    background:var(--surface); border-bottom:1px solid var(--border);
  }
  .search-box {
    flex:1; display:flex; align-items:center; gap:8px;
    background:var(--bg2); border:1.5px solid var(--border);
    border-radius:var(--radius-md); padding:0 12px; transition:border-color .18s;
  }
  .search-box:focus-within { border-color:var(--green-mid); }
  .search-box svg { color:var(--text-dim); flex-shrink:0; }
  .search-box input {
    background:none; border:none; outline:none; color:var(--text);
    font-size:14px; font-family:'Inter',sans-serif; padding:10px 0; width:100%;
  }
  .search-box input::placeholder { color:var(--text-dim); }
  .filter-fab {
    display:flex; align-items:center; gap:6px;
    background:var(--bg2); border:1.5px solid var(--border);
    border-radius:var(--radius-md); padding:10px 14px;
    color:var(--text-muted); font-size:13px; font-weight:600;
    cursor:pointer; white-space:nowrap; transition:all .18s; flex-shrink:0;
    font-family:'Inter',sans-serif;
  }
  .filter-fab.has-filter { background:var(--green-pale); border-color:var(--green-mid); color:var(--green); }
  .reset-btn {
    display:flex; align-items:center; justify-content:center;
    width:42px; height:42px; flex-shrink:0;
    background:var(--red-dim); border:1.5px solid rgba(192,48,48,.3);
    border-radius:var(--radius-md); color:var(--red); cursor:pointer; transition:all .18s;
  }
  .reset-btn:hover { background:rgba(192,48,48,.18); }

  /* ── DATE NAV ── */
  .date-nav {
    display:flex; align-items:center;
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 4px; position:sticky; top:0; z-index:99;
  }
  .dnav-arrow { background:none; border:none; color:var(--text-dim); font-size:26px; padding:6px 8px; cursor:pointer; flex-shrink:0; transition:color .15s; line-height:1; }
  .dnav-arrow:hover { color:var(--text); }
  .dnav-arrow:disabled { opacity:.25; cursor:default; }
  .dnav-scroll { display:flex; gap:4px; overflow-x:auto; flex:1; padding:7px 4px; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .dnav-scroll::-webkit-scrollbar { display:none; }
  .dnav-pill { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:1px; padding:5px 9px; border-radius:var(--radius-sm); cursor:pointer; border:1px solid transparent; transition:all .18s; background:none; font-family:'Inter',sans-serif; min-width:44px; }
  .dnav-pill:hover { background:var(--bg2); }
  .dnav-pill.active { background:var(--green); border-color:var(--green-mid); }
  .dnav-pill.today:not(.active) { border-color:rgba(160,120,32,.5); }
  .dnav-pill.has-live:not(.active) .dnav-dd::after { content:''; display:inline-block; width:5px; height:5px; background:var(--red); border-radius:50%; margin-left:4px; vertical-align:middle; animation:pulse 1.2s ease-in-out infinite; }
  .dnav-dd { font-family:'Bebas Neue',sans-serif; font-size:19px; color:var(--text); line-height:1; }
  .dnav-pill.active .dnav-dd { color:#fff; }
  .dnav-mo { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.07em; font-weight:600; }
  .dnav-pill.active .dnav-mo { color:rgba(255,255,255,.7); }
  .dnav-pill.today:not(.active) .dnav-dd { color:var(--gold); }

  /* ── TAB BAR ── */
  .tab-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:150;
    background:rgba(255,255,255,.96); border-top:1px solid var(--border);
    backdrop-filter:blur(20px); display:flex;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 8px; background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif; color:var(--text-dim); transition:color .18s; }
  .tab-btn.active { color:var(--green-mid); }
  .tab-btn svg { width:22px; height:22px; }
  .tab-btn span { font-size:10px; font-weight:600; letter-spacing:.04em; }

  /* ── PAGES ── */
  .page { display:none; }
  .page.active { display:block; }
  .content, .bracket-page, .favs-page { padding-bottom:calc(100px + env(safe-area-inset-bottom)) !important; }

  /* ── CONTENT ── */
  .content { padding:14px 14px 0; max-width:1000px; margin:0 auto; padding-bottom:calc(100px + env(safe-area-inset-bottom)); }
  .legend { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); align-items:center; }
  .legend-label { font-size:10px; color:var(--text-dim); font-weight:700; letter-spacing:.07em; text-transform:uppercase; margin-right:2px; }

  /* ── DATE GROUP ── */
  .date-group { margin-bottom:22px; }
  .date-label { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .date-label-text { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--text); letter-spacing:.06em; }
  .date-label-day { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; font-weight:700; }
  .date-label-line { flex:1; height:1px; background:var(--border); }
  .stage-header { display:flex; align-items:center; gap:10px; padding:16px 0 10px; }
  .stage-title { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:.1em; color:var(--gold); }
  .stage-line { flex:1; height:1px; background:rgba(160,120,32,.2); }

  /* ── MATCH CARD ── */
  .match-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
    padding:0; margin-bottom:8px; cursor:pointer; overflow:hidden; position:relative;
    transition:border-color .15s, box-shadow .15s, transform .1s;
    box-shadow:0 1px 4px rgba(0,0,0,.06);
  }
  .match-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--group-color,var(--border)); }
  .match-card:hover  { border-color:var(--border2); box-shadow:0 2px 10px rgba(0,0,0,.1); }
  .match-card:active { transform:scale(.99); }
  .mc-inner { display:grid; grid-template-columns:60px 1fr auto; align-items:center; padding:12px 12px 12px 16px; gap:10px; }
  .mc-time { text-align:center; }
  .mc-time-val { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--green-mid); line-height:1; white-space:nowrap; }
  .mc-time-tz { font-size:9px; color:var(--text-dim); letter-spacing:.06em; text-transform:uppercase; margin-top:1px; }
  .mc-time-live { font-size:9px; color:var(--red); font-weight:700; margin-top:2px; animation:pulse 1.2s infinite; }
  .mc-time-done { font-size:9px; color:var(--text-dim); margin-top:2px; }
  .mc-center { min-width:0; }
  .mc-teams { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .mc-flag { font-size:16px; flex-shrink:0; }
  .mc-team { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .mc-team.right { text-align:right; }
  .mc-vs { font-size:10px; color:var(--text-dim); font-weight:500; padding:2px 5px; background:var(--bg2); border-radius:4px; flex-shrink:0; }
  .mc-score-big { font-family:'Bebas Neue',sans-serif; font-size:23px; color:var(--text); flex-shrink:0; letter-spacing:.04em; line-height:1; padding:0 5px; }
  .mc-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .mc-group-badge { font-size:9px; font-weight:800; letter-spacing:.08em; padding:2px 6px; border-radius:4px; color:#fff; text-transform:uppercase; background:var(--group-color,#888); flex-shrink:0; }
  .mc-venue { font-size:10px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mc-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
  .mc-chips-mini { display:flex; gap:3px; }
  .dot-chip { width:7px; height:7px; border-radius:50%; flex-shrink:0; outline:1px solid rgba(0,0,0,.08); }
  .mc-bell { font-size:14px; opacity:.2; }
  .mc-bell.set { opacity:1; }
  .live-pulse { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--red); flex-shrink:0; margin-right:2px; animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);} }
  .live-min-badge { font-size:9px; font-weight:700; color:var(--red); margin-top:2px; text-align:center; white-space:nowrap; }
  .done-badge     { font-size:9px; font-weight:600; color:var(--text-dim); margin-top:2px; text-align:center; }

  /* ── CHANNEL CHIPS ── */
  .ch { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:700; letter-spacing:.03em; padding:3px 7px; border-radius:5px; white-space:nowrap; border:1px solid transparent; }
  .ch-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .ch-free  { background:rgba(34,160,77,.1);  color:#167a30; border-color:rgba(34,160,77,.2); }
  .ch-free  .ch-dot { background:#22a04d; }
  .ch-cable { background:rgba(26,100,200,.1); color:#1a5cb8; border-color:rgba(26,100,200,.2); }
  .ch-cable .ch-dot { background:#2468cc; }
  .ch-vix   { background:var(--gold-pale); color:var(--gold); border-color:rgba(160,120,32,.2); }
  .ch-vix   .ch-dot { background:var(--gold-light); }

  /* ── FAV PILL ── */
  .fav-pill { display:none; align-items:center; gap:5px; background:var(--gold-pale); border:1px solid rgba(160,120,32,.3); border-radius:100px; padding:7px 14px; font-size:12px; font-weight:600; color:var(--gold); cursor:pointer; white-space:nowrap; transition:all .18s; font-family:'Inter',sans-serif; }
  .fav-pill.visible { display:inline-flex; }
  .fav-pill.active  { background:rgba(160,120,32,.18); border-color:var(--gold); }

  /* ── EMPTY ── */
  .empty-state { text-align:center; padding:60px 20px; color:var(--text-dim); }
  .empty-state h3 { font-size:18px; margin-bottom:6px; color:var(--text-muted); }
  .empty-icon { font-size:44px; margin-bottom:14px; opacity:.3; }
  .no-results { display:none; }

  /* ── FILTER DRAWER ── */
  .filter-overlay { position:fixed; inset:0; z-index:202; background:rgba(0,0,0,.35); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .25s; }
  .filter-overlay.open { opacity:1; pointer-events:all; }
  .filter-drawer { position:fixed; bottom:0; left:0; right:0; z-index:203; background:var(--surface); border-radius:20px 20px 0 0; border-top:1px solid var(--border); transform:translateY(100%); transition:transform .32s cubic-bezier(.32,0,.15,1); box-shadow:0 -4px 24px rgba(0,0,0,.12); padding-bottom:env(safe-area-inset-bottom); }
  .filter-drawer.open { transform:translateY(0); }
  .filter-drawer-handle { width:40px; height:4px; border-radius:2px; background:var(--border2); margin:12px auto 0; }
  .filter-drawer-body { padding:20px 16px 8px; }
  .fdr-section { margin-bottom:18px; }
  .fdr-label { font-size:10px; font-weight:800; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; }
  .fdr-group { display:flex; flex-wrap:wrap; gap:8px; }
  .fpill { background:var(--bg2); border:1.5px solid var(--border); border-radius:100px; padding:8px 16px; font-size:13px; font-weight:500; color:var(--text-muted); cursor:pointer; transition:all .18s; white-space:nowrap; font-family:'Inter',sans-serif; }
  .fpill:hover { border-color:var(--green-mid); color:var(--text); }
  .fpill.active { background:var(--green); border-color:var(--green); color:#fff; }
  .fdr-apply { width:100%; padding:14px; margin-top:4px; margin-bottom:12px; background:var(--green); border:none; border-radius:var(--radius-md); color:#fff; font-size:15px; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; transition:background .15s; }
  .fdr-apply:hover { background:var(--green-mid); }

  /* ── BOTTOM SHEET ── */
  .sheet-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.4); backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity .3s; }
  .sheet-overlay.open { opacity:1; pointer-events:all; }
  .sheet { position:fixed; bottom:0; left:0; right:0; z-index:201; background:var(--surface); border-radius:20px 20px 0 0; border-top:1px solid var(--border); transform:translateY(100%); transition:transform .35s cubic-bezier(.32,0,.15,1); max-height:92vh; display:flex; flex-direction:column; box-shadow:0 -4px 24px rgba(0,0,0,.12); }
  .sheet.open { transform:translateY(0); }
  .sheet-handle { width:40px; height:4px; border-radius:2px; background:var(--border2); margin:12px auto 0; flex-shrink:0; cursor:grab; }
  .sheet-body { overflow-y:auto; padding:18px 18px 36px; flex:1; overscroll-behavior:contain; }
  .sheet-accent { height:3px; width:100%; border-radius:2px; margin-bottom:16px; background:var(--group-color,var(--green)); }
  .sheet-meta-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .sheet-stage-badge { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:3px 10px; border-radius:100px; background:var(--group-color,var(--green)); color:#fff; }
  .sheet-matchnum { font-size:11px; color:var(--text-dim); }
  .sheet-teams { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:16px; }
  .sheet-team  { display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; text-align:center; }
  .sheet-flag  { font-size:40px; line-height:1; }
  .sheet-tname { font-size:14px; font-weight:700; color:var(--text); line-height:1.2; }
  .sheet-vs    { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--text-dim); flex-shrink:0; }
  .sheet-time-block { background:var(--green-pale); border:1px solid rgba(34,160,77,.2); border-radius:var(--radius-md); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .sheet-time-big { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--green-mid); line-height:1; }
  .sheet-time-right { text-align:right; }
  .sheet-time-tz   { font-size:11px; color:var(--text-muted); font-weight:600; }
  .sheet-time-date { font-size:12px; color:var(--text-dim); margin-top:2px; }
  .sheet-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .sheet-info-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; }
  .sic-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.08em; font-weight:700; margin-bottom:3px; }
  .sic-value { font-size:12px; font-weight:600; color:var(--text); line-height:1.3; }
  .sheet-reminder-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:13px; border-radius:var(--radius-md); margin-bottom:10px; font-size:14px; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; transition:all .2s; border:1.5px solid; }
  .sheet-reminder-btn.unset { background:var(--green-pale); border-color:rgba(34,160,77,.3); color:var(--green); }
  .sheet-reminder-btn.set   { background:var(--gold-pale);  border-color:rgba(160,120,32,.35); color:var(--gold); }
  .sheet-section-title { font-size:10px; font-weight:800; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; margin-bottom:8px; }
  .sheet-broadcast-list { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .sbl-item { display:flex; align-items:center; gap:10px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; }
  .sbl-icon { font-size:18px; flex-shrink:0; }
  .sbl-info { flex:1; min-width:0; }
  .sbl-name { font-size:12px; font-weight:700; color:var(--text); }
  .sbl-detail { font-size:10px; color:var(--text-muted); margin-top:1px; }
  .sheet-close { width:100%; padding:13px; margin-top:4px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-md); color:var(--text-muted); font-size:14px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; transition:background .15s; }
  .sheet-close:hover { background:var(--border); }
  .sheet-free-note { border-radius:var(--radius-sm); padding:10px 12px; margin-bottom:12px; font-size:12px; line-height:1.4; }
  .sheet-free-note.free { background:rgba(34,160,77,.08); border:1px solid rgba(34,160,77,.18); color:#167a30; }
  .sheet-free-note.paid { background:rgba(26,100,200,.08); border:1px solid rgba(26,100,200,.15); color:#1a5cb8; }

  /* ── NOTIFICATION BANNER ── */
  .notif-banner { position:fixed; top:calc(14px + env(safe-area-inset-top)); left:14px; right:14px; z-index:300; border-radius:var(--radius-lg); background:var(--surface); border:1px solid var(--green-mid); box-shadow:0 4px 20px rgba(0,0,0,.15); padding:14px 14px; display:flex; align-items:flex-start; gap:10px; transform:translateY(-120%); opacity:0; transition:transform .35s cubic-bezier(.32,0,.15,1), opacity .35s; }
  .notif-banner.show { transform:translateY(0); opacity:1; }
  .notif-icon  { font-size:26px; flex-shrink:0; margin-top:2px; }
  .notif-body  { flex:1; min-width:0; }
  .notif-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:2px; }
  .notif-sub   { font-size:11px; color:var(--text-muted); line-height:1.4; }
  .notif-close { background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; padding:2px 4px; flex-shrink:0; font-family:'Inter',sans-serif; }

  /* ── BRACKET PAGE ── */
  .bracket-page { padding:18px 14px 0; max-width:1000px; margin:0 auto; padding-bottom:calc(100px + env(safe-area-inset-bottom)); }
  .bracket-page h2 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:.08em; color:var(--text); margin-bottom:4px; }
  .bracket-sub { font-size:11px; color:var(--text-dim); margin-bottom:20px; }
  .bracket-section-title { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:.1em; color:var(--gold); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
  .bracket-section-title::after { content:''; flex:1; height:1px; background:rgba(160,120,32,.2); }
  .groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:10px; margin-bottom:28px; }
  .group-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.05); }
  .group-card-header { display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--border); background:var(--bg2); }
  .group-letter { font-family:'Bebas Neue',sans-serif; font-size:18px; width:24px; height:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; }
  .group-card-title { font-size:11px; color:var(--text-muted); font-weight:700; letter-spacing:.04em; }
  .group-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .group-table { width:100%; border-collapse:collapse; min-width:280px; }
  .group-table th { font-size:9px; color:var(--text-dim); font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:6px 8px; text-align:right; white-space:nowrap; background:var(--bg2); }
  .group-table th:first-child { text-align:left; width:20px; }
  .group-table th:nth-child(2) { text-align:left; }
  .group-table td { padding:8px 8px; font-size:12px; color:var(--text); text-align:right; border-top:1px solid var(--border); white-space:nowrap; }
  .group-table td:first-child { text-align:left; padding-left:12px; }
  .group-table td:nth-child(2) { text-align:left; padding-left:4px; }
  .group-table td:last-child { padding-right:12px; }
  .group-table tr.qualified td:nth-child(2) { font-weight:700; }
  .gt-team { display:flex; align-items:center; gap:6px; }
  .gt-flag { font-size:15px; }
  .gt-name { font-size:11px; font-weight:600; }
  .gt-pts  { font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--green-mid); }
  .gt-pos  { width:17px; height:17px; border-radius:4px; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--text-dim); }
  .gt-pos.q1 { background:rgba(34,160,77,.18); color:var(--green); }
  .gt-pos.q2 { background:rgba(34,160,77,.1);  color:var(--green); }
  .gt-pos.q3 { background:var(--gold-pale); color:var(--gold); }
  .knockout-grid { display:flex; flex-direction:column; gap:8px; margin-bottom:28px; }
  .ko-match { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; display:grid; grid-template-columns:1fr auto 1fr; align-items:stretch; box-shadow:0 1px 4px rgba(0,0,0,.05); }
  .ko-match.finished { border-color:var(--border2); }
  .ko-match.live     { border-color:var(--red); }
  .ko-team  { display:flex; align-items:center; gap:7px; padding:11px 12px; font-size:12px; font-weight:600; }
  .ko-team.right { flex-direction:row-reverse; text-align:right; }
  .ko-team.winner { color:var(--green-mid); }
  .ko-team.loser  { color:var(--text-dim); }
  .ko-flag  { font-size:18px; flex-shrink:0; }
  .ko-center { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px 10px; border-left:1px solid var(--border); border-right:1px solid var(--border); min-width:52px; background:var(--bg2); }
  .ko-score { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--text); line-height:1; letter-spacing:.04em; }
  .ko-score.live { color:var(--red); }
  .ko-time  { font-size:9px; color:var(--text-dim); margin-top:2px; text-align:center; }

  /* ── FAVS PAGE ── */
  .favs-page { padding:18px 14px 0; max-width:600px; margin:0 auto; padding-bottom:calc(100px + env(safe-area-inset-bottom)); }
  .favs-onboarding { background:linear-gradient(135deg,rgba(34,160,77,.08) 0%,rgba(160,120,32,.06) 100%); border:1px solid rgba(34,160,77,.2); border-radius:var(--radius-lg); padding:18px; margin-bottom:18px; text-align:center; }
  .favs-onboarding-icon { font-size:36px; margin-bottom:8px; }
  .favs-onboarding h3  { font-size:15px; font-weight:700; color:var(--green); margin-bottom:5px; }
  .favs-onboarding p   { font-size:12px; color:var(--text-muted); line-height:1.5; }
  .favs-selected-banner { background:var(--gold-pale); border:1px solid rgba(160,120,32,.25); border-radius:var(--radius-sm); padding:10px 12px; font-size:12px; color:var(--gold); margin-bottom:14px; display:none; align-items:center; gap:6px; line-height:1.4; }
  .favs-selected-banner.visible { display:flex; }
  .country-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }

// ── CARD BUILDER ────────────────────────────────────────────────────
function buildCard(m){
  const gc  = getGC(m);
  const bc  = getBroadcast(m);
  const ld  = liveData[m.matchNum] || {};
  const isLive = STATUS_LIVE.has(ld.status);
  const isDone = STATUS_DONE.has(ld.status);
  const homeN = resolveTeam(m.matchNum,'home',m.home);
  const awayN = resolveTeam(m.matchNum,'away',m.away||'');
  const hasScore = (ld.scoreH !== null && ld.scoreA !== null && ld.scoreH !== undefined);
  const scoreStr = hasScore ? ld.scoreH + '–' + ld.scoreA : '';
  const isReminded = reminders.has(m.matchNum);

  // dots
  const dots = bc.map(b=>{
    const col = b.cls==='ch-free'?'#3dd68c':b.cls==='ch-cable'?'#5aa0ff':'#e8c96a';
    return '<span class="dot-chip" style="background:'+col+'"></span>';
  }).join('');

  // group badge
  const gBadge = m.group
    ? '<span class="mc-group-badge" style="background:'+gc+'">G '+m.group+'</span>'
    : '<span class="mc-group-badge" style="background:'+gc+';opacity:.7">'+( STAGE_LABELS[m.stage]||'').slice(0,6)+'</span>';

  // teams row
  const tLeft = m.away !== undefined
    ? '<span class="mc-flag">'+getFlag(homeN)+'</span><span class="mc-team">'+homeN+'</span>'
    : '<span class="mc-team">'+homeN+'</span>';
  const tRight = m.away !== undefined && m.away !== ''
    ? (hasScore
        ? '<span class="mc-score-big">'+scoreStr+'</span><span class="mc-team right">'+awayN+'</span><span class="mc-flag">'+getFlag(awayN)+'</span>'
        : '<span class="mc-vs">VS</span><span class="mc-team right">'+awayN+'</span><span class="mc-flag">'+getFlag(awayN)+'</span>')
    : (hasScore ? '<span class="mc-score-big">'+scoreStr+'</span>' : '');

  // status
  const statusLine = isLive
    ? '<div class="mc-time-live">🔴 '+(ld.minute?ld.minute+"'":'LIVE')+'</div>'
    : isDone ? '<div class="mc-time-done">Final</div>' : '';

  // bell icon
  const bell = '<span class="mc-bell'+(isReminded?' set':'')+'">🔔</span>';

  // card border color when live
  const extraStyle = isLive ? ';border-color:#e05050' : isDone ? ';border-color:var(--border2)' : '';

  return '<div class="match-card" style="--group-color:'+gc+extraStyle+'" data-idx="'+m.matchNum+'" data-stage="'+m.stage+'" data-country="'+countryOf(m.city)+'" data-search="'+[homeN,awayN,m.venue,m.city,m.group||''].join(' ').toLowerCase()+'">'
    + '<div class="mc-inner">'
    +   '<div class="mc-time">'
    +     '<div class="mc-time-val">'+fmtTime(m.time)+'</div>'
    +     '<div class="mc-time-tz">CT</div>'
    +     statusLine
    +   '</div>'
    +   '<div class="mc-center">'
    +     '<div class="mc-teams">'+tLeft+tRight+'</div>'
    +     '<div class="mc-meta">'+gBadge+'<span class="mc-venue">📍 '+m.venue+'</span></div>'
    +   '</div>'
    +   '<div class="mc-right">'
    +     '<div class="mc-chips-mini">'+(isLive?'<span class="live-pulse"></span>':'')+dots+'</div>'
    +     bell
    +   '</div>'
    + '</div>'
    + '</div>';
}


function openSheet(m){
  const gc  = getGC(m);
  const bc  = getBroadcast(m);
  const ld2 = liveData[m.matchNum] || {};
  const isLive2 = STATUS_LIVE.has(ld2.status);
  const isDone2 = STATUS_DONE.has(ld2.status);
  const hasScore2 = (ld2.scoreH !== null && ld2.scoreH !== undefined && ld2.scoreA !== null);
  const freeChannels = bc.filter(b=>b.cls==='ch-free');
  const hasFree = freeChannels.length > 0;
  const isReminded = reminders.has(m.matchNum);

  const homeR = resolveTeam(m.matchNum,'home',m.home);
  const awayR = m.away ? resolveTeam(m.matchNum,'away',m.away) : '';

  // Teams block
  let teamBlock;
  if(m.away){
    const vsLabel = hasScore2 ? (ld2.scoreH + ' – ' + ld2.scoreA) : 'VS';
    teamBlock = '<div class="sheet-teams">'
      + '<div class="sheet-team"><div class="sheet-flag">'+getFlag(homeR)+'</div><div class="sheet-tname">'+homeR+'</div></div>'
      + '<div class="sheet-vs">'+vsLabel+'</div>'
      + '<div class="sheet-team"><div class="sheet-flag">'+getFlag(awayR)+'</div><div class="sheet-tname">'+awayR+'</div></div>'
      + '</div>';
  } else {
    teamBlock = '<div style="text-align:center;padding:14px 0 18px"><div style="font-size:18px;font-weight:700;color:var(--text)">'+homeR+'</div></div>';
  }

  // Time block
  const statusLabel = (ld2.status && STATUS_LABEL[ld2.status]) ? STATUS_LABEL[ld2.status] : 'Hora de inicio';
  let scoreOrTime = hasScore2
    ? '<div style="font-family:Bebas Neue,sans-serif;font-size:48px;color:var(--text);line-height:1;letter-spacing:.04em">'+ld2.scoreH+' – '+ld2.scoreA+'</div>'
    : '<div class="sheet-time-big">'+fmtTime(m.time)+'</div>';
  const minuteRow = (isLive2 && ld2.minute)
    ? '<div style="font-size:12px;color:var(--red);font-weight:700;margin-top:4px">⏱ Min '+ld2.minute+'</div>' : '';

  const timeBlock = '<div class="sheet-time-block">'
    + '<div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">'+statusLabel+'</div>'
    + scoreOrTime + minuteRow + '</div>'
    + '<div class="sheet-time-right">'
    + '<div class="sheet-time-tz">Hora Centro MX (CT)</div>'
    + '<div class="sheet-time-date">'+fmtDate(m.date,m.day)+'</div>'
    + '<div style="font-size:10px;color:var(--text-dim);margin-top:2px">'+fmtTime(m.time)+' CT = '+addHour(m.time,1)+' ET</div>'
    + '</div></div>';

  // Reminder button
  const reminderBtn = '<button class="sheet-reminder-btn '+(isReminded?'set':'unset')+'" onclick="handleReminderToggle('+m.matchNum+',this)">'
    + (isReminded ? '🔔 Recordatorio activado · 15 min antes' : '🔔 Activar recordatorio · 15 min antes')
    + '</button>';

  // Free note
  const freeNote = '<div class="sheet-free-note '+(hasFree?'free':'paid')+'">'
    + (hasFree ? '✅ Disponible en <strong>TV abierta</strong> gratis' : '📡 Requiere suscripción — TUDN o ViX')
    + '</div>';

  // Broadcast rows
  const broadcastItems = bc.map(b =>
    '<div class="sbl-item"><span class="sbl-icon">'+b.icon+'</span>'
    + '<div class="sbl-info"><div class="sbl-name">'+b.name+'</div><div class="sbl-detail">'+b.detail+'</div></div>'
    + '<span class="ch '+b.cls+'" style="font-size:9px;padding:2px 6px">'+b.type+'</span></div>'
  ).join('');

  const countryFlag = countryOf(m.city)==='mexico'?'🇲🇽':countryOf(m.city)==='canada'?'🇨🇦':'🇺🇸';

  sheetBody.innerHTML =
    '<div class="sheet-accent" style="--group-color:'+gc+'"></div>'
    + '<div class="sheet-meta-top">'
    +   '<span class="sheet-stage-badge" style="background:'+gc+'">'+(STAGE_LABELS[m.stage]||m.stage)+(m.group?' · Grupo '+m.group:'')+'</span>'
    +   '<span class="sheet-matchnum">Partido #'+m.matchNum+'</span>'
    + '</div>'
    + teamBlock
    + timeBlock
    + '<div class="sheet-info-grid">'
    +   '<div class="sheet-info-card"><div class="sic-label">Estadio</div><div class="sic-value">'+m.venue+'</div></div>'
    +   '<div class="sheet-info-card"><div class="sic-label">Ciudad '+countryFlag+'</div><div class="sic-value">'+m.city+'</div></div>'
    + '</div>'
    + reminderBtn
    + freeNote
    + '<div class="sheet-section-title">Dónde ver en México</div>'
    + '<div class="sheet-broadcast-list">'+broadcastItems+'</div>'
    + '<button class="sheet-close" onclick="closeSheet()">Cerrar</button>';

  document.body.style.overflow='hidden';
  overlay.classList.add('open');
  sheet.classList.add('open');
}

function handleReminderToggle(matchNum, btn){
  const isNow = toggleReminder(matchNum);
  btn.className = 'sheet-reminder-btn ' + (isNow ? 'set' : 'unset');
  btn.textContent = isNow ? '🔔 Recordatorio activado · 15 min antes' : '🔔 Activar recordatorio · 15 min antes';
  scheduleNotifications();
}


function addHour(t, n){
  const [h,m]=t.split(':').map(Number);
  const nh=(h+n)%24;
  return `${nh%12||12}:${String(m).padStart(2,'0')} ${nh>=12?'PM':'AM'}`;
}

function closeSheet(){
  overlay.classList.remove('open');
  sheet.classList.remove('open');
  document.body.style.overflow='';
}

// ── TOUCH DRAG TO DISMISS ────────────────────────────────────────────
let dragStart=null, dragging=false;
function onTouchStart(e){
  dragStart=e.touches[0].clientY;
  dragging=true;
  sheet.style.transition='none';
}
function onTouchMove(e){
  if(!dragging) return;
  const dy=e.touches[0].clientY-dragStart;
  if(dy>0) sheet.style.transform=`translateY(${dy}px)`;
}
function onTouchEnd(e){
  dragging=false;
  sheet.style.transition='transform .35s cubic-bezier(.32,0,.15,1)';
  const dy=e.changedTouches[0].clientY-dragStart;
  if(dy>100){ closeSheet(); sheet.style.transform=''; }
  else { sheet.style.transform='translateY(0)'; }
}
handle.addEventListener('touchstart',onTouchStart,{passive:true});
handle.addEventListener('touchmove', onTouchMove, {passive:true});
handle.addEventListener('touchend',  onTouchEnd,  {passive:true});

overlay.addEventListener('click', closeSheet);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSheet(); });

// ── EVENT DELEGATION: card click ────────────────────────────────────
document.getElementById('scheduleContainer').addEventListener('click', e=>{
  const card=e.target.closest('.match-card');
  if(!card) return;
  const idx=parseInt(card.dataset.idx,10);
  const m=MATCHES.find(x=>x.matchNum===idx);
  if(m) openSheet(m);
});

// ── DATE NAV ─────────────────────────────────────────────────────────
// Get sorted unique dates from MATCHES
const ALL_DATES = [...new Set(MATCHES.map(m=>m.date))].sort();
const MONTHS_SHORT = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// Active date filter: null = show all
let activeDate = null;

function todayStr(){
  // Today in CT (UTC-5, no DST adjustment — close enough for this use)
  const now = new Date();
  const ct  = new Date(now.getTime() - (5*60*60*1000)); // rough CT
  return ct.toISOString().slice(0,10);
}

function initDateNav(){
  const today   = todayStr();
  // Default: today if it has matches, else first match date (Jun 11)
  const hasToday = ALL_DATES.includes(today);
  activeDate = hasToday ? today : ALL_DATES[0];

  buildDatePills();
  scrollToActive();
}

function buildDatePills(){
  const scroll = document.getElementById('dnavScroll');
  const today  = todayStr();
  scroll.innerHTML = '';
  ALL_DATES.forEach(d => {
    const [,mo,dd] = d.split('-').map(Number);
    const isToday  = d === today;
    const isActive = d === activeDate;
    const hasLive  = Object.values(liveData).some(ld =>
      STATUS_LIVE.has(ld.status) && MATCHES.find(m=>m.matchNum===parseInt(Object.keys(liveData).find(k=>liveData[k]===ld)))?.date===d
    );
    const btn = document.createElement('button');
    btn.className = 'dnav-pill' + (isActive?' active':'') + (isToday?' today':'') + (hasLive?' has-live':'');
    btn.dataset.date = d;
    btn.innerHTML = '<span class="dnav-dd">'+dd+'</span><span class="dnav-mo">'+MONTHS_SHORT[mo]+'</span>';
    btn.addEventListener('click', ()=>{ setActiveDate(d); });
    scroll.appendChild(btn);
  });
  // Prev / next arrow state
  const idx = ALL_DATES.indexOf(activeDate);
  document.getElementById('dnavPrev').disabled = idx <= 0;
  document.getElementById('dnavNext').disabled = idx >= ALL_DATES.length-1;
}

function setActiveDate(d){
  activeDate = d;
  buildDatePills();
  scrollToActive();
  render();
  // Scroll content to top
  window.scrollTo({top:0, behavior:'smooth'});
}

// ══════════════════════════════════════════════════════
//  LIVE DATA — football-data.org (free tier, WC = 2026)
//  Docs: https://www.football-data.org/documentation/quickstart
//  No API key required for the World Cup on the free tier.
//  Rate limit: 10 req/min  → we poll every 60s live, 5min idle
// ══════════════════════════════════════════════════════

const API_BASE = 'https://api.football-data.org/v4';
// Competition WC = FIFA World Cup. Season 2026.
const WC_CODE  = 'WC';

// ── State overlay: matchNum → live data from API
// Structure: { score:{home,away}, status, homeTeam, awayTeam }
const liveData = {};

// ── Status map → legible label
const STATUS_LABEL = {
  SCHEDULED:'Programado', TIMED:'Programado', IN_PLAY:'🔴 En vivo',
  PAUSED:'Medio tiempo', FINISHED:'Final', POSTPONED:'Pospuesto',
  CANCELLED:'Cancelado', SUSPENDED:'Suspendido', AWARDED:'Adjudicado',
};
const STATUS_LIVE   = new Set(['IN_PLAY','PAUSED']);
const STATUS_DONE   = new Set(['FINISHED','AWARDED']);

// ── Map API team names → our FLAGS keys (best-effort fuzzy)
const NAME_MAP = {
  // API name → our dataset name
  'Mexico':'México',
  'United States':'USA',
  'Bosnia-Herzegovina':'Bosnia & Herzegovina',
  'Turkey':'Türkiye',
  'Türkiye':'Türkiye',
  'Korea Republic':'South Korea',
  'South Korea':'South Korea',
  "Côte d'Ivoire":'Ivory Coast',
  'Ivory Coast':'Ivory Coast',
  'IR Iran':'Iran',
  'Iran':'Iran',
  'DR Congo':'DR Congo',
  'Congo DR':'DR Congo',
  // Pass-through (API name matches ours exactly)
  'South Africa':'South Africa','Czechia':'Czechia','Canada':'Canada',
  'Paraguay':'Paraguay','Qatar':'Qatar','Switzerland':'Switzerland',
  'Brazil':'Brazil','Morocco':'Morocco','Haiti':'Haiti','Scotland':'Scotland',
  'Australia':'Australia','Germany':'Germany','Curaçao':'Curaçao',
  'Netherlands':'Netherlands','Japan':'Japan','Ecuador':'Ecuador',
  'Sweden':'Sweden','Tunisia':'Tunisia','Spain':'Spain','Cape Verde':'Cape Verde',
  'Belgium':'Belgium','Egypt':'Egypt','Saudi Arabia':'Saudi Arabia',
  'Uruguay':'Uruguay','New Zealand':'New Zealand','France':'France',
  'Senegal':'Senegal','Iraq':'Iraq','Norway':'Norway','Argentina':'Argentina',
  'Algeria':'Algeria','Austria':'Austria','Jordan':'Jordan','Portugal':'Portugal',
  'England':'England','Croatia':'Croatia','Ghana':'Ghana','Panama':'Panama',
  'Uzbekistan':'Uzbekistan','Colombia':'Colombia',
};
function mapName(n){ return NAME_MAP[n] || n; }

// ── Fetch all WC matches from API
async function fetchMatches(){
  const TARGET = `${API_BASE}/competitions/${WC_CODE}/matches`;
  let data = null;
  try {
    // Cloudflare Worker proxy — handles CORS and injects auth token
    const PROXY = 'https://mundial-proxy.darien-lombarderofidelitymkt.workers.dev/';
    const fetchPromise = fetch(PROXY);
    const timeoutPromise = new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 15000));
    const res = await Promise.race([fetchPromise, timeoutPromise]);
    if(!res.ok){ return; }
    data = await res.json();
    if(!data || !data.matches){ return; }
  } catch(e){
    console.warn('[WC API] fetch failed:', e.message);
    return;
  }

  try {
    let changed = false;

    // Log first few matches so we can verify team name mapping
    if(data.matches?.length > 0 && !window._apiNamesLogged){
      window._apiNamesLogged = true;
      console.log('[WC API] Team names sample:');
      data.matches.slice(0,8).forEach(m => {
        console.log(`  API: "${m.homeTeam?.name}" vs "${m.awayTeam?.name}" | status: ${m.status} | score: ${JSON.stringify(m.score?.fullTime)}`);
      });
    }

    for(const m of (data.matches||[])){
      const homeNorm = mapName(m.homeTeam?.name||'');
      const awayNorm = mapName(m.awayTeam?.name||'');
      const status   = m.status;
      const scoreH   = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? null;
      const scoreA   = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? null;

      // Find matching entry — try exact name match first, then date+partial
      const local = MATCHES.find(lm => {
        const lHome = resolveTeam(lm.matchNum,'home',lm.home);
        const lAway = resolveTeam(lm.matchNum,'away',lm.away||'');
        // Exact match on both teams
        if((lHome===homeNorm && lAway===awayNorm) ||
           (lHome===awayNorm && lAway===homeNorm)) return true;
        // Same date + one team matches
        if(lm.date === m.utcDate?.slice(0,10)){
          if(lHome===homeNorm || lAway===awayNorm ||
             lHome===awayNorm || lAway===homeNorm) return true;
        }
        return false;
      });
      if(!local) continue;

      const key = local.matchNum;
      const prev = liveData[key]||{};
      const next = {
        status,
        scoreH, scoreA,
        homeTeam: homeNorm || prev.homeTeam,
        awayTeam: awayNorm || prev.awayTeam,
        minute: m.minute || null,
      };

      // Check if anything changed
      if(JSON.stringify(prev)!==JSON.stringify(next)){
        liveData[key] = next;
        changed = true;
      }
    }

    if(changed){
      render();
      if(document.getElementById('page-bracket').classList.contains('active')) renderBracket();
      buildDatePills();
    }
  } catch(e){
    // parse error — ignore silently
  }
}

// ── Polling: 60s during live match, 5min otherwise
let pollTimer = null;
function isAnyMatchLive(){
  return Object.values(liveData).some(d => STATUS_LIVE.has(d.status));
}
function schedulePoll(){
  clearTimeout(pollTimer);
  const delay = isAnyMatchLive() ? 60_000 : 300_000;
  pollTimer = setTimeout(()=>{ fetchMatches().then(schedulePoll); }, delay);
}

// ── Inject live score into a card's HTML
// Called from buildCard() — returns the score badge HTML or ''
function scoreBadge(matchNum){
  const d = liveData[matchNum];
  if(!d) return '';
  const isLive = STATUS_LIVE.has(d.status);
  const isDone = STATUS_DONE.has(d.status);
  if(!isLive && !isDone) return '';

  const scoreStr = (d.scoreH !== null && d.scoreA !== null)
    ? `${d.scoreH} – ${d.scoreA}` : '– –';
  const minStr = isLive && d.minute ? ` ${d.minute}'` : '';
  const label  = STATUS_LABEL[d.status] || d.status;

  const bg  = isLive
    ? 'background:rgba(255,60,60,.15);border-color:rgba(255,60,60,.35);color:#ff6060'
    : 'background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);color:var(--text-muted)';

  return `<span class="live-badge" style="${bg}">${isLive?'🔴 ':''}<strong>${scoreStr}</strong>${minStr} <span style="font-size:9px;opacity:.7">${label}</span></span>`;
}

// ── Override team names in knockout rounds from API data
function resolveTeam(matchNum, side, fallback){
  const d = liveData[matchNum];
  if(!d) return fallback;
  if(side==='home' && d.homeTeam && !d.homeTeam.startsWith('Ganador') && !d.homeTeam.startsWith('Campeón'))
    return d.homeTeam;
  if(side==='away' && d.awayTeam && !d.awayTeam.startsWith('Ganador') && !d.awayTeam.startsWith('Campeón'))
    return d.awayTeam;
  return fallback;
}

// ── Kick off on load
fetchMatches().then(schedulePoll);

// ── SWIPE TO CHANGE DATE ─────────────────────────────────────────────
(function(){
  let sx=0, sy=0, sTime=0;
  let isHoriz=false, decided=false;  // decided = we know the direction
  const el = document.getElementById('scheduleContainer');
  const body = document.body;

  // NON-passive touchstart so we can call preventDefault immediately
  // if needed in subsequent moves
  body.addEventListener('touchstart', e=>{
    if(e.target.closest('.sheet,.date-nav,.topbar,.filter-drawer')) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    sTime = Date.now();
    isHoriz = false;
    decided = false;
  }, {passive:true});

  // NON-passive touchmove — cancel scroll the moment we detect horizontal intent
  body.addEventListener('touchmove', e=>{
    if(e.target.closest('.sheet,.date-nav,.topbar,.filter-drawer')) return;
    if(decided && !isHoriz) return; // already decided it's vertical — let it scroll

    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    const adx = Math.abs(dx), ady = Math.abs(dy);

    // Need at least 6px of movement to decide direction
    if(!decided && adx < 6 && ady < 6) return;

    if(!decided){
      decided = true;
      isHoriz = adx > ady * 1.0; // horizontal if dx is at least equal to dy
    }

    // Horizontal gesture confirmed — block scroll immediately
    if(isHoriz) e.preventDefault();
  }, {passive:false});

  body.addEventListener('touchend', e=>{
    if(e.target.closest('.sheet,.date-nav,.topbar,.filter-drawer')) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    const dt = Date.now() - sTime;
    isHoriz = false;
    decided = false;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5 && dt < 400){
      // swipe left = next date, swipe right = prev date
      const delta = dx < 0 ? 1 : -1;
      const idx = ALL_DATES.indexOf(activeDate);
      const next = idx + delta;
      if(next >= 0 && next < ALL_DATES.length){
        // Animate content slide
        const dir = delta > 0 ? '-60px' : '60px';
        el.style.transition = 'opacity .15s,transform .15s';
        el.style.opacity = '0';
        el.style.transform = 'translateX('+dir+')';
        setTimeout(()=>{
          setActiveDate(ALL_DATES[next]);
          el.style.transition = 'none';
          el.style.opacity = '0';
          el.style.transform = 'translateX('+(delta>0?'60px':'-60px')+')';
          requestAnimationFrame(()=>{
            requestAnimationFrame(()=>{
              el.style.transition = 'opacity .2s,transform .2s';
              el.style.opacity = '1';
              el.style.transform = 'translateX(0)';
            });
          });
        }, 150);
      }
    }
  }, {passive:true});
})();

// Build standings from liveData + MATCHES results
function computeStandings(){
  // standings[team] = {w,d,l,gf,ga,pts}
  const st = {};
  const init = (t) => { if(!st[t]) st[t]={w:0,d:0,l:0,gf:0,ga:0,pts:0}; };

  MATCHES.forEach(m => {
    if(m.stage!=='groups') return;
    const ld = liveData[m.matchNum];
    if(!ld || !STATUS_DONE.has(ld.status)) return;
    if(ld.scoreH===null||ld.scoreA===null) return;

    const home = resolveTeam(m.matchNum,'home',m.home);
    const away = resolveTeam(m.matchNum,'away',m.away||'');
    init(home); init(away);

    st[home].gf += ld.scoreH; st[home].ga += ld.scoreA;
    st[away].gf += ld.scoreA; st[away].ga += ld.scoreH;

    if(ld.scoreH > ld.scoreA){
      st[home].w++; st[home].pts+=3; st[away].l++;
    } else if(ld.scoreH < ld.scoreA){
      st[away].w++; st[away].pts+=3; st[home].l++;
    } else {
      st[home].d++; st[home].pts+=1; st[away].d++; st[away].pts+=1;
    }
  });
  return st;
}

// Group teams by group letter
function buildGroupMap(){
  const gm = {};
  MATCHES.forEach(m=>{
    if(!m.group) return;
    const g = m.group;
    if(!gm[g]) gm[g]=new Set();
    gm[g].add(resolveTeam(m.matchNum,'home',m.home));
    if(m.away) gm[g].add(resolveTeam(m.matchNum,'away',m.away));
  });
  return gm;
}

function renderGroupTables(st, groupMap){
  const GC_MAP = {A:'#e04040',B:'#e07830',C:'#d0b020',D:'#50b840',E:'#30a8c8',F:'#5870e8',G:'#9858e8',H:'#e848a8',I:'#48d0a8',J:'#e86848',K:'#a8c030',L:'#30b8e0'};
  let html = '<div class="groups-grid">';

  'ABCDEFGHIJKL'.split('').forEach(letter=>{
    const teams = [...(groupMap[letter]||new Set())];
    if(!teams.length) return;

    // Sort: pts desc → gd desc → gf desc → name
    teams.sort((a,b)=>{
      const sa=st[a]||{pts:0,gf:0,ga:0}, sb=st[b]||{pts:0,gf:0,ga:0};
      if(sb.pts!==sa.pts) return sb.pts-sa.pts;
      const gda=(sa.gf-sa.ga), gdb=(sb.gf-sb.ga);
      if(gdb!==gda) return gdb-gda;
      if(sb.gf!==sa.gf) return sb.gf-sa.gf;
      return a.localeCompare(b);
    });

    html += '<div class="group-card">';
    html += '<div class="group-card-header">';
    html += '<span class="group-letter" style="background:'+GC_MAP[letter]+'">'+letter+'</span>';
    html += '<span class="group-card-title">GRUPO '+letter+'</span>';
    html += '</div>';
    html += '<div class="group-table-wrap"><table class="group-table"><thead><tr>';
    html += '<th></th><th></th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GD</th><th>Pts</th>';
    html += '</tr></thead><tbody>';

    teams.forEach((team,i)=>{
      const s = st[team]||{w:0,d:0,l:0,gf:0,ga:0,pts:0};
      const pj = s.w+s.d+s.l;
      const gd = s.gf-s.ga;
      const gdStr = gd>0?'+'+gd:String(gd);
      const posClass = i===0?'gt-pos q1':i===1?'gt-pos q2':i===2?'gt-pos q3':'gt-pos';
      const rowClass = i<=1?'qualified':'';
      html += '<tr class="'+rowClass+'">';
      html += '<td><span class="'+posClass+'">'+(i+1)+'</span></td>';
      html += '<td><div class="gt-team"><span class="gt-flag">'+getFlag(team)+'</span><span class="gt-name">'+team+'</span></div></td>';
      html += '<td>'+pj+'</td><td>'+s.w+'</td><td>'+s.d+'</td><td>'+s.l+'</td>';
      html += '<td style="color:'+(gd>0?'#3dd68c':gd<0?'#ff6060':'var(--text-dim)')+'">'+gdStr+'</td>';
      html += '<td><span class="gt-pts">'+s.pts+'</span></td>';
      html += '</tr>';
    });

    html += '</tbody></table></div></div>';
  });

  html += '</div>';
  return html;
}

function renderKnockoutRound(label, matchNums){
  let html = '<div class="bracket-section-title">'+label+'</div>';
  html += '<div class="knockout-grid">';

  matchNums.forEach(n=>{
    const m = MATCHES.find(x=>x.matchNum===n);
    if(!m) return;
    const ld = liveData[n]||{};
    const isLive = STATUS_LIVE.has(ld.status);
    const isDone = STATUS_DONE.has(ld.status);
    const hasScore = isDone||isLive;

    const homeN = resolveTeam(n,'home',m.home);
    const awayN = resolveTeam(n,'away',m.away||'—');
    const homeWin = isDone && ld.scoreH > ld.scoreA;
    const awayWin = isDone && ld.scoreA > ld.scoreH;

    const scoreStr = hasScore && ld.scoreH!==null ? ld.scoreH+' – '+ld.scoreA : fmtTime(m.time);
    const scoreClass = 'ko-score'+(isLive?' live':'');
    const timeLabel = isLive ? '🔴 LIVE '+(ld.minute?ld.minute+"'":'') : (isDone?'Final':'CT '+fmtTime(m.time));

    const cardClass = 'ko-match'+(isLive?' live':isDone?' finished':'');

    html += '<div class="'+cardClass+'">';
    html += '<div class="ko-team'+(homeWin?' winner':isDone?' loser':'')+'">';
    html += '<span class="ko-flag">'+getFlag(homeN)+'</span>';
    html += '<span>'+homeN+'</span></div>';
    html += '<div class="ko-center">';
    html += '<span class="'+scoreClass+'">'+scoreStr+'</span>';
    html += '<span class="ko-time">'+timeLabel+'</span>';
    html += '</div>';
    html += '<div class="ko-team right'+(awayWin?' winner':isDone?' loser':'')+'">';
    html += '<span class="ko-flag">'+getFlag(awayN)+'</span>';
    html += '<span>'+awayN+'</span></div>';
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function renderBracket(){
  const container = document.getElementById('bracketContent');
  const st = computeStandings();
  const groupMap = buildGroupMap();
  const groupsPlayed = Object.values(st).length > 0;

  let html = '<h2>Clasificación Mundial 2026</h2>';
  html += '<p class="bracket-sub">Se actualiza automáticamente con los resultados — los 2 primeros de cada grupo + los 8 mejores terceros avanzan</p>';

  // Groups
  html += '<div class="bracket-section-title">Fase de Grupos</div>';
  html += renderGroupTables(st, groupMap);

  // Knockout rounds

}
function resetAll(){
  // Clear all filters, search, and date → go back to today/first date
  searchTerm = ''; document.getElementById('searchInput').value = '';
  activeStage = 'all'; activeCountry = null; favOnly = false;
  document.getElementById('favPill').classList.remove('active');
  document.querySelectorAll('[data-stage]').forEach(b=>{
    b.classList.toggle('active', b.dataset.stage==='all');
  });
  document.querySelectorAll('[data-country]').forEach(b=>{
    b.classList.toggle('active', b.dataset.country==='all');
  });
  // Restore default date
  const today = todayStr();
  activeDate = ALL_DATES.includes(today) ? today : ALL_DATES[0];
  buildDatePills();
  scrollToActive();
  updateFilterBtn();
  render();
}

// ══════════════════════════════════════════════════════════════
//  FAVORITES
// ══════════════════════════════════════════════════════════════
const FAV_KEY  = 'mundial2026_favs';
let favorites  = new Set(JSON.parse(localStorage.getItem(FAV_KEY)||'[]'));

function saveFavs(){ localStorage.setItem(FAV_KEY, JSON.stringify([...favorites])); }

function toggleFav(homeN, awayN){
  const hasFavHome = favorites.has(homeN);
  const hasFavAway = favorites.has(awayN);
  if(hasFavHome || hasFavAway){
    favorites.delete(homeN); favorites.delete(awayN);
  } else {
    if(homeN) favorites.add(homeN);
    if(awayN && awayN !== '—') favorites.add(awayN);
  }
  saveFavs();
  updateFavPill();
  updateFavsTabBadge();
  startCountdown();
  scheduleNotifications();
  render();
}

function toggleFavFilter(){
  favOnly = !favOnly;
  document.getElementById('favPill').classList.toggle('active', favOnly);
  render();
}

function updateFavPill(){
  const pill = document.getElementById('favPill');
  if(favorites.size > 0){
    pill.classList.add('visible');
    pill.textContent = '⭐ Mis equipos (' + favorites.size + ')';
  } else {
    pill.classList.remove('visible');
    favOnly = false;
  }
}

// ══════════════════════════════════════════════════════════════
//  COUNTDOWN — next upcoming match (of favs if any, else global)
// ══════════════════════════════════════════════════════════════
let cdInterval = null;

function getMatchDateTime(m){
  // Convert match date + CT time → UTC Date object
  // CT = UTC-5 (CDT in summer, close enough)
  const [y,mo,d] = m.date.split('-').map(Number);
  const [h,mi]   = m.time.split(':').map(Number);
  return new Date(Date.UTC(y, mo-1, d, h+5, mi)); // CT+5 = UTC
}

// Next match overall (no fav filter)
function findNextMatchGlobal(){
  const now = Date.now();
  return MATCHES
    .map(m => ({ m, dt: getMatchDateTime(m) }))
    .filter(({dt}) => dt.getTime() > now)
    .sort((a,b) => a.dt - b.dt)[0] || null;
}

// Next fav match only
function findNextMatchFav(){
  if(favorites.size === 0) return null;
  const now = Date.now();
  return MATCHES
    .filter(m => favorites.has(resolveTeam(m.matchNum,'home',m.home)) || favorites.has(resolveTeam(m.matchNum,'away',m.away||'')))
    .map(m => ({ m, dt: getMatchDateTime(m) }))
    .filter(({dt}) => dt.getTime() > now)
    .sort((a,b) => a.dt - b.dt)[0] || null;
}

// Kept for backward compatibility
function findNextMatch(){ return findNextMatchGlobal(); }

function updateCountdown(){
  const block = document.getElementById('countdownBlock');
  const timerEl = document.getElementById('cdTimer');
  const matchEl = document.getElementById('cdMatch');
  const labelEl = document.getElementById('cdLabel');

  const next = findNextMatchGlobal();
  if(!next){ block.style.display='none'; return; }

  block.style.display='block';
  const {m, dt} = next;
  const diff = dt.getTime() - Date.now();
  const homeN = resolveTeam(m.matchNum,'home',m.home);
  const awayN = resolveTeam(m.matchNum,'away',m.away||'');
  const bc    = getBroadcast(m);
  const freeBC = bc.find(b=>b.cls==='ch-free');
  const channelStr = freeBC ? freeBC.name.split('/')[0].trim() : bc[0]?.name || 'ViX';

  if(diff <= 0){
    timerEl.className = 'cd-timer live';
    timerEl.textContent = '¡EN VIVO!';
    labelEl.textContent = 'Partido en curso';
  } else {
    timerEl.className = 'cd-timer';
    labelEl.textContent = 'Próximo partido';
    const totalSec = Math.floor(diff/1000);
    const days = Math.floor(totalSec/86400);
    const hrs  = Math.floor((totalSec%86400)/3600);
    const mins = Math.floor((totalSec%3600)/60);
    const secs = totalSec % 60;
    if(days > 0){
      timerEl.textContent = days+'d ' + String(hrs).padStart(2,'0')+'h ' + String(mins).padStart(2,'0')+'m';
    } else {
      timerEl.textContent = String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    }
  }

  matchEl.innerHTML = '<strong>' + getFlag(homeN) + ' ' + homeN + ' vs ' + awayN + ' ' + getFlag(awayN) + '</strong>'
    + '<br>' + fmtTime(m.time) + ' CT &nbsp;·&nbsp; ' + m.date.slice(5).replace('-','/')
    + '<br><span class="cd-channel">📺 ' + channelStr + '</span>';
}

function startCountdown(){
  updateCountdown();
  clearInterval(cdInterval);
  cdInterval = setInterval(updateCountdown, 1000);
}

// ══════════════════════════════════════════════════════════════
//  IN-APP NOTIFICATIONS (30 min before fav matches)
// ══════════════════════════════════════════════════════════════
const NOTIF_KEY    = 'mundial2026_notified';
let notifiedSet    = new Set(JSON.parse(localStorage.getItem(NOTIF_KEY)||'[]'));
let notifTimer     = null;
let notifDismissTimer = null;

function saveNotified(){ localStorage.setItem(NOTIF_KEY, JSON.stringify([...notifiedSet])); }

function dismissNotif(){
  document.getElementById('notifBanner').classList.remove('show');
  clearTimeout(notifDismissTimer);
}

function showNotif(title, sub){
  const banner = document.getElementById('notifBanner');
  document.getElementById('notifTitle').textContent = title;
  document.getElementById('notifSub').textContent   = sub;
  banner.classList.add('show');
  clearTimeout(notifDismissTimer);
  notifDismissTimer = setTimeout(dismissNotif, 8000);
}

function checkNotifications(){
  const now = Date.now();

  MATCHES.forEach(m => {
    const homeN = resolveTeam(m.matchNum,'home',m.home);
    const awayN = resolveTeam(m.matchNum,'away',m.away||'');

    // Determine if this match should fire a notification:
    // (a) user has a fav team playing → 35min window
    // (b) user set a per-match reminder → 20min window at 15min mark
    const isFavMatch = favorites.size > 0 && (favorites.has(homeN) || favorites.has(awayN));
    const isRemMatch = reminders.has(m.matchNum);
    if(!isFavMatch && !isRemMatch) return;

    const dt   = getMatchDateTime(m);
    const diff = dt.getTime() - now;

    // Fav match: fire between 35min and 1min before
    const favKey = 'notif_fav_' + m.matchNum;
    if(isFavMatch && diff > 0 && diff <= 35*60*1000 && !notifiedSet.has(favKey)){
      notifiedSet.add(favKey);
      saveNotified();
      const bc = getBroadcast(m);
      const ch = (bc.find(b=>b.cls==='ch-free') || bc[0])?.name.split('/')[0].trim() || 'ViX';
      const minsLeft = Math.round(diff/60000);
      fireNotif(
        '⭐ ' + getFlag(homeN)+' '+homeN+' vs '+awayN+' '+getFlag(awayN),
        'En '+minsLeft+' min · '+fmtTime(m.time)+' CT · '+ch,
        favKey
      );
    }

    // Per-match reminder: fire between 20min and 10min before (15min target)
    const remKey = 'notif_rem_' + m.matchNum;
    if(isRemMatch && diff > 0 && diff <= 20*60*1000 && diff >= 10*60*1000 && !notifiedSet.has(remKey)){
      notifiedSet.add(remKey);
      saveNotified();
      const bc = getBroadcast(m);
      const ch = (bc.find(b=>b.cls==='ch-free') || bc[0])?.name.split('/')[0].trim() || 'ViX';
      fireNotif(
        '🔔 ' + getFlag(homeN)+' '+homeN+' vs '+awayN+' '+getFlag(awayN),
        '15 min para el partido · '+fmtTime(m.time)+' CT · '+ch,
        remKey
      );
    }
  });
}

function fireNotif(title, body, tag){
  showNotif(title, body);
  if('Notification' in window && Notification.permission === 'granted'){
    try { new Notification(title, {body, tag, renotify:false}); } catch(e){}
  }
}

function scheduleNotifications(){
  clearInterval(notifTimer);
  if(favorites.size === 0) return;
  // Check immediately on setup
  checkNotifications();
  // Then every 30 seconds — much more reliable than 60s
  notifTimer = setInterval(checkNotifications, 30_000);
}

// Request Web Notification permission when user adds first favorite
function requestNotifPermission(){
  if('Notification' in window && Notification.permission === 'default'){
    Notification.requestPermission();
  }
}

// ══════════════════════════════════════════════════════════════
//  FAVS PAGE — all 48 teams, grouped by continent
// ══════════════════════════════════════════════════════════════
// Flat sorted list of all 48 teams
const ALL_TEAMS_SORTED = [
  'Algeria','Argentina','Australia','Austria','Belgium','Bosnia & Herzegovina',
  'Brazil','Canada','Cape Verde','Colombia','Croatia','Curaçao','Czechia',
  'DR Congo','Ecuador','Egypt','England','France','Germany','Ghana',
  'Haiti','Iran','Iraq','Ivory Coast','Japan','Jordan','México',
  'Morocco','Netherlands','New Zealand','Norway','Panama','Paraguay',
  'Portugal','Qatar','Saudi Arabia','Scotland','Senegal','South Africa',
  'South Korea','Spain','Sweden','Switzerland','Tunisia','Türkiye',
  'Uruguay','USA','Uzbekistan',
];

function renderFavsPage(){
  const c = document.getElementById('favsContent');
  const favCount = favorites.size;

  let html = '';

  // Onboarding banner
  // Fav countdown block
  const favNext = findNextMatchFav();
  if(favNext){
    const favDiff = favNext.dt.getTime() - Date.now();
    const favHomeN = resolveTeam(favNext.m.matchNum,'home',favNext.m.home);
    const favAwayN = resolveTeam(favNext.m.matchNum,'away',favNext.m.away||'');
    const favBC    = getBroadcast(favNext.m);
    const favCh    = (favBC.find(b=>b.cls==='ch-free')||favBC[0])?.name.split('/')[0].trim()||'ViX';
    let favTimerStr;
    if(favDiff <= 0){
      favTimerStr = '¡EN VIVO!';
    } else {
      const ts = Math.floor(favDiff/1000);
      const d  = Math.floor(ts/86400), hr = Math.floor((ts%86400)/3600), mn = Math.floor((ts%3600)/60), sc = ts%60;
      favTimerStr = d > 0
        ? d+'d '+String(hr).padStart(2,'0')+'h '+String(mn).padStart(2,'0')+'m'
        : String(hr).padStart(2,'0')+':'+String(mn).padStart(2,'0')+':'+String(sc).padStart(2,'0');
    }
    html += '<div class="countdown-block" style="margin-bottom:18px">'
      + '<div class="cd-label">Próximo partido favorito</div>'
      + '<div class="cd-timer'+(favDiff<=0?' live':'')+'">' + favTimerStr + '</div>'
      + '<div class="cd-match"><strong>'+getFlag(favHomeN)+' '+favHomeN+' vs '+favAwayN+' '+getFlag(favAwayN)+'</strong>'
      + '<br>'+fmtTime(favNext.m.time)+' CT &nbsp;·&nbsp; '+favNext.m.date.slice(5).replace('-','/')
      + '<br><span class="cd-channel">📺 '+favCh+'</span></div>'
      + '</div>';
  }

  html += '<div class="favs-onboarding">'
    + '<div class="favs-onboarding-icon">⭐</div>'
    + '<h3>Marca tus equipos favoritos</h3>'
    + '<p>Recibirás un recordatorio <strong>30 minutos antes</strong> de cada partido de los equipos que selecciones. Tus favoritos se guardan permanentemente en tu dispositivo.</p>'
    + '</div>';

  // Selected summary
  if(favCount > 0){
    const names = [...favorites].sort().join(', ');
    html += '<div class="favs-selected-banner visible">'
      + '⭐ ' + favCount + ' equipo' + (favCount>1?'s':'') + ' seleccionado' + (favCount>1?'s':'') + ': <strong>' + names + '</strong>'
      + '</div>';
  }

  // Render all teams alphabetically in a single grid
  html += '<div class="country-grid">';
  ALL_TEAMS_SORTED.forEach(norm=>{
    const isFav    = favorites.has(norm);
    const safeAttr = norm.replace(/"/g,'&quot;');
    html += '<div class="country-chip' + (isFav?' active':'') + '" data-team="' + safeAttr + '" onclick="handleChipClick(this)">'
      + '<span class="country-chip-flag">' + getFlag(norm) + '</span>'
      + '<span class="country-chip-name">' + norm + '</span>'
      + '<span class="country-chip-check">✓</span>'
      + '</div>';
  });
  html += '</div>';

  c.innerHTML = html;
}

function handleChipClick(el){
  const team = el.dataset.team;
  toggleFavTeam(team);
}

function toggleFavTeam(team){
  if(favorites.has(team)){
    favorites.delete(team);
  } else {
    favorites.add(team);
    if(favorites.size === 1) requestNotifPermission();
  }
  saveFavs();
  updateFavPill();
  updateFavsTabBadge();
  startCountdown();
  scheduleNotifications();
  renderFavsPage();
}

function updateFavsTabBadge(){
  const btn = document.getElementById('tab-favs');
  if(!btn) return;
  const n = favorites.size;
  // show dot on tab if favs exist
  const span = btn.querySelector('span');
  span.textContent = n > 0 ? 'Favoritos (' + n + ')' : 'Favoritos';
}

// hide reset btn initially
document.getElementById('resetBtn').style.display='none';
updateFavPill();
updateFavsTabBadge();
scheduleNotifications(); // resume any pending reminders
// ══════════════════════════════════════════════════════════════
//  RENDER — main list renderer
// ══════════════════════════════════════════════════════════════
function render(){
  const container = document.getElementById('scheduleContainer');
  const empty     = document.getElementById('emptyState');

  let filtered = MATCHES.filter(m=>{
    const homeN = resolveTeam(m.matchNum,'home',m.home);
    const awayN = resolveTeam(m.matchNum,'away',m.away||'');
    if(favOnly && !favorites.has(homeN) && !favorites.has(awayN)) return false;
    if(activeDate && activeStage==='all' && !searchTerm && !activeCountry && !favOnly){
      if(m.date !== activeDate) return false;
    }
    if(activeStage!=='all' && m.stage!==activeStage) return false;
    if(activeCountry && countryOf(m.city)!==activeCountry) return false;
    if(searchTerm){
      const hay=[homeN,awayN,m.venue,m.city,m.group||'',STAGE_LABELS[m.stage]||''].join(' ').toLowerCase();
      if(!hay.includes(searchTerm.toLowerCase())) return false;
    }
    return true;
  });

  if(!filtered.length){
    container.innerHTML='';
    empty.classList.remove('no-results');
    return;
  }
  empty.classList.add('no-results');

  // Group by date
  const byDate={};
  filtered.forEach(m=>{
    if(!byDate[m.date]) byDate[m.date]={day:m.day,matches:[]};
    byDate[m.date].matches.push(m);
  });

  let html='', lastStage=null;
  Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,{day,matches:ms}])=>{
    const s = ms[0].stage;
    if(s !== lastStage){
      html += '<div class="stage-header"><div class="stage-title">'+(STAGE_LABELS[s]||s)+'</div><div class="stage-line"></div></div>';
      lastStage = s;
    }
    const [,mo,dd] = date.split('-').map(Number);
    html += '<div class="date-group">';
    html += '<div class="date-label"><span class="date-label-day">'+day+'</span><span class="date-label-text">'+dd+' de '+MONTHS_FULL[mo]+'</span><div class="date-label-line"></div></div>';
    ms.forEach(m=>{ html += buildCard(m); });
    html += '</div>';
  });
  container.innerHTML = html;
}


initDateNav();
render();
startCountdown();
scheduleNotifications();
</script>

<!-- ═══ Service Worker — offline cache ═══ -->
<script>
if ('serviceWorker' in navigator) {
  const SW_SRC = `
const CACHE = 'mundial2026-v1';
const FONTS = [
  'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap'
];
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(FONTS)).catch(()=>{})
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() =>
      new Response('', {status: 408})
    ))
  );
});
`;
  const blob = new Blob([SW_SRC], {type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url, {scope:'./'})
    .then(()=>{ URL.revokeObjectURL(url); })
    .catch(()=>{ URL.revokeObjectURL(url); });
}
</script>
