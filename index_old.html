<style>

  /* ── FORCED DARK MODE — always ── */
  html { background:#04080f !important; }
  body { background:#04080f !important; color:#e8edf5 !important; }
  @media (prefers-color-scheme: light) {
    html, body { background:#04080f !important; color:#e8edf5 !important; }
  }

  /* ── iOS PWA: safe areas (notch / Dynamic Island / home bar) ── */
  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  .topbar  { padding-top: calc(12px + env(safe-area-inset-top)); }
  .hero    { padding-top: calc(48px + env(safe-area-inset-top)); }
  .sheet   { padding-bottom: env(safe-area-inset-bottom); }
  @media (display-mode: standalone) {
    .hero { padding-top: calc(32px + env(safe-area-inset-top)); }
  }
  :root {
    --bg: #04080f; --surface: #0d1520; --surface2: #111d2e; --surface3: #162236;
    --border: #1a2d44; --gold: #c8a94a; --gold-light: #e8c96a;
    --blue: #1a6fd4; --blue-bright: #2d8fff;
    --text: #e8edf5; --text-muted: #7a8fa8; --text-dim: #4a6070;
  }

  html, body { background:#04080f !important; color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* ── HERO ── */
  .hero { position:relative; padding:48px 24px 32px; text-align:center; overflow:hidden; }
  .hero::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(26,111,212,.35) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 20% 100%, rgba(200,169,74,.12) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 80% 100%, rgba(200,169,74,.12) 0%, transparent 60%);
    pointer-events:none;
  }
  .hero-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(200,169,74,.12); border:1px solid rgba(200,169,74,.3);
    border-radius:100px; padding:6px 16px;
    font-size:11px; font-weight:600; letter-spacing:.12em; color:var(--gold); text-transform:uppercase;
    margin-bottom:20px;
  }
  .hero-badge::before { content:'⚽'; }
  .hero h1 {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,10vw,96px);
    letter-spacing:.04em; line-height:.9;
    background:linear-gradient(160deg,#fff 30%,var(--gold-light) 70%,var(--gold) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:8px;
  }
  .hero-sub { font-size:13px; color:var(--text-muted); letter-spacing:.06em; text-transform:uppercase; font-weight:500; margin-bottom:28px; }
  .hero-stats { display:flex; justify-content:center; gap:32px; flex-wrap:wrap; }
  .stat { text-align:center; }
  .stat-n { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold-light); line-height:1; }
  .stat-l { font-size:11px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }

  /* ── TOPBAR (not sticky) ── */
  .topbar {
    padding:12px 16px;
    display:flex; align-items:center; gap:10px;
    background:var(--bg);
  }
  .search-box {
    flex:1;
    display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:0 12px;
  }
  .search-box svg { color:var(--text-dim); flex-shrink:0; }
  .search-box input {
    background:none; border:none; outline:none; color:var(--text);
    font-size:14px; font-family:'Inter',sans-serif; padding:10px 0; width:100%;
  }
  .search-box input::placeholder { color:var(--text-dim); }

  /* filter button */
  .filter-fab {
    display:flex; align-items:center; gap:6px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; color:var(--text-muted); font-size:13px; font-weight:600;
    cursor:pointer; white-space:nowrap; transition:all .18s; flex-shrink:0;
    font-family:'Inter',sans-serif;
  }
  .filter-fab.has-filter {
    background:rgba(26,111,212,.18); border-color:var(--blue); color:var(--blue-bright);
  }
  .filter-fab:hover { border-color:var(--blue); color:var(--text); }

  /* reset all filters button */
  .reset-btn {
    display:flex; align-items:center; justify-content:center;
    width:40px; height:40px; flex-shrink:0;
    background:rgba(200,60,60,.25); border:1px solid rgba(200,60,60,.5);
    border-radius:10px; color:#ff8080; cursor:pointer;
    transition:all .18s; font-family:'Inter',sans-serif;
  }
  .reset-btn:hover { background:rgba(200,60,60,.4); color:#fff; }

  /* ── FILTER DRAWER ── */
  .filter-overlay {
    position:fixed; inset:0; z-index:202;
    background:rgba(0,0,0,.55); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .filter-overlay.open { opacity:1; pointer-events:all; }
  .filter-drawer {
    position:fixed; bottom:0; left:0; right:0; z-index:203;
    background:var(--surface2);
    border-radius:20px 20px 0 0;
    border-top:1px solid var(--border);
    transform:translateY(100%);
    transition:transform .32s cubic-bezier(.32,0,.15,1);
    box-shadow:0 -8px 40px rgba(0,0,0,.5);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .filter-drawer.open { transform:translateY(0); }
  .filter-drawer-handle {
    width:40px; height:4px; border-radius:2px;
    background:rgba(255,255,255,.15); margin:12px auto 0;
  }
  .filter-drawer-body { padding:20px 20px 8px; }
  .fdr-section { margin-bottom:20px; }
  .fdr-label {
    font-size:11px; font-weight:700; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px;
  }
  .fdr-group { display:flex; flex-wrap:wrap; gap:8px; }
  .fpill {
    background:var(--surface); border:1px solid var(--border); border-radius:100px;
    padding:8px 16px; font-size:13px; font-weight:500; color:var(--text-muted);
    cursor:pointer; transition:all .18s; white-space:nowrap;
    font-family:'Inter',sans-serif;
  }
  .fpill:hover { border-color:var(--blue); color:var(--text); }
  .fpill.active { background:var(--blue); border-color:var(--blue); color:#fff; }
  .fdr-apply {
    width:100%; padding:14px; margin-top:4px; margin-bottom:12px;
    background:var(--blue); border:none; border-radius:12px;
    color:#fff; font-size:15px; font-weight:700; font-family:'Inter',sans-serif;
    cursor:pointer; transition:background .15s;
  }
  .fdr-apply:hover { background:var(--blue-bright); }

  /* ── TZ BAR ── */
  .tz-bar {
    background:rgba(26,111,212,.1); border-bottom:1px solid rgba(26,111,212,.2);
    padding:8px 20px; font-size:11px; color:var(--text-muted);
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  }
  .tz-bar span { color:var(--blue-bright); font-weight:600; }

  /* ── CONTENT ── */
  .content { padding:24px 20px 80px; max-width:1000px; margin:0 auto; }

  /* ── LEGEND ── */
  .legend {
    display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;
    padding:12px 16px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px; align-items:center;
  }
  .legend-label { font-size:11px; color:var(--text-dim); font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-right:4px; }

  /* ── DATE GROUP ── */
  .date-group { margin-bottom:28px; }
  .date-label { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .date-label-text { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--text); letter-spacing:.06em; }
  .date-label-day { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; font-weight:600; }
  .date-label-line { flex:1; height:1px; background:var(--border); }

  /* ── MATCH CARD ── */
  .match-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; margin-bottom:8px;
    display:grid; grid-template-columns:68px 1fr; grid-template-rows:auto auto;
    gap:0; cursor:pointer;
    transition:border-color .15s, background .15s, transform .12s;
    position:relative; overflow:hidden; user-select:none;
  }
  .match-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--group-color,var(--border)); border-radius:3px 0 0 3px;
  }
  .match-card:hover  { border-color:rgba(255,255,255,.16); background:var(--surface2); }
  .match-card:active { transform:scale(.985); background:var(--surface3); }

  /* tap hint arrow */
  .match-card::after {
    content:'›'; position:absolute; right:14px; top:50%; transform:translateY(-50%);
    font-size:18px; color:var(--text-dim); opacity:.4; pointer-events:none;
  }

  .mc-time {
    grid-column:1; grid-row:1/3;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding-right:14px; border-right:1px solid var(--border); margin-right:16px; gap:2px;
  }
  .mc-time-val { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold-light); line-height:1; white-space:nowrap; }
  .mc-time-tz  { font-size:9px; color:var(--text-dim); letter-spacing:.07em; text-transform:uppercase; }

  .mc-top { grid-column:2; grid-row:1; display:flex; align-items:center; gap:8px; padding-bottom:8px; padding-right:20px; }
  .mc-teams { display:flex; align-items:center; gap:7px; flex:1; font-size:14px; font-weight:600; color:var(--text); min-width:0; }
  .mc-flag  { font-size:18px; flex-shrink:0; }
  .mc-team  { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mc-team.right { text-align:right; }
  .mc-vs    { font-size:10px; color:var(--text-dim); font-weight:500; padding:2px 5px; background:rgba(255,255,255,.05); border-radius:4px; flex-shrink:0; }
  .mc-score-big {
    font-family:'Bebas Neue',sans-serif; font-size:26px; font-weight:400;
    color:var(--text); flex-shrink:0; letter-spacing:.06em; line-height:1;
    padding:0 6px; white-space:nowrap;
  }
  .mc-group-badge {
    flex-shrink:0; font-size:10px; font-weight:700; letter-spacing:.07em;
    padding:2px 7px; border-radius:4px; color:#fff; text-transform:uppercase;
    background:var(--group-color,#444);
  }
  .mc-bottom {
    grid-column:2; grid-row:2;
    display:flex; align-items:center; gap:8px; padding-top:8px;
    border-top:1px solid rgba(255,255,255,.05); padding-right:20px;
  }
  .mc-venue      { font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .mc-chips-mini { display:flex; gap:3px; flex-shrink:0; }

  /* ── CHANNEL CHIPS ── */
  .ch {
    display:inline-flex; align-items:center; gap:3px;
    font-size:10px; font-weight:700; letter-spacing:.03em;
    padding:3px 7px; border-radius:5px; white-space:nowrap; border:1px solid transparent;
  }
  .ch-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .ch-free  { background:rgba(31,160,96,.15);    color:#3dd68c;         border-color:rgba(31,160,96,.25); }
  .ch-free  .ch-dot { background:#3dd68c; }
  .ch-cable { background:rgba(26,111,212,.15);   color:#5aa0ff;         border-color:rgba(26,111,212,.25); }
  .ch-cable .ch-dot { background:#5aa0ff; }
  .ch-vix   { background:rgba(200,169,74,.12);   color:var(--gold-light); border-color:rgba(200,169,74,.25); }
  .ch-vix   .ch-dot { background:var(--gold-light); }

  /* mini dot only */
  .dot-chip {
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
    outline:1px solid rgba(255,255,255,.1);
  }

  /* ── STAGE HEADER ── */
  .stage-header { display:flex; align-items:center; gap:12px; padding:20px 0 12px; }
  .stage-title  { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.1em; color:var(--gold); }
  .stage-line   { flex:1; height:1px; background:rgba(200,169,74,.2); }

  /* ── EMPTY STATE ── */
  .empty-state { text-align:center; padding:60px 20px; color:var(--text-dim); }
  .empty-state h3 { font-size:20px; margin-bottom:8px; color:var(--text-muted); }
  .empty-icon { font-size:48px; margin-bottom:16px; opacity:.4; }
  .no-results { display:none; }

  /* ══════════════════════════════════════════
     BOTTOM SHEET MODAL
  ══════════════════════════════════════════ */
  .sheet-overlay {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(4px);
    opacity:0; pointer-events:none;
    transition:opacity .3s ease;
  }
  .sheet-overlay.open { opacity:1; pointer-events:all; }

  .sheet {
    position:fixed; bottom:0; left:0; right:0; z-index:201;
    background:var(--surface2);
    border-radius:20px 20px 0 0;
    border-top:1px solid var(--border);
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.32,0,.15,1);
    max-height:92vh;
    display:flex; flex-direction:column;
    box-shadow:0 -8px 40px rgba(0,0,0,.5);
  }
  .sheet.open { transform:translateY(0); }

  /* drag handle */
  .sheet-handle {
    width:40px; height:4px; border-radius:2px;
    background:rgba(255,255,255,.15);
    margin:12px auto 0;
    flex-shrink:0;
    cursor:grab;
  }
  .sheet-handle:active { cursor:grabbing; }

  /* scrollable body */
  .sheet-body {
    overflow-y:auto; padding:20px 20px 40px;
    flex:1;
    overscroll-behavior:contain;
  }

  /* sheet accent bar */
  .sheet-accent {
    height:4px; width:100%; border-radius:2px;
    margin-bottom:20px;
    background:var(--group-color,var(--blue));
  }

  /* sheet header: match number + stage */
  .sheet-meta-top {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .sheet-stage-badge {
    font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    padding:3px 10px; border-radius:100px;
    background:var(--group-color,var(--blue));
    color:#fff;
  }
  .sheet-matchnum { font-size:11px; color:var(--text-dim); }

  /* teams display */
  .sheet-teams {
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom:20px;
  }
  .sheet-team {
    display:flex; flex-direction:column; align-items:center; gap:6px;
    flex:1; text-align:center;
  }
  .sheet-flag  { font-size:44px; line-height:1; }
  .sheet-tname { font-size:15px; font-weight:700; color:var(--text); line-height:1.2; }
  .sheet-vs    {
    font-family:'Bebas Neue',sans-serif; font-size:28px;
    color:var(--text-dim); flex-shrink:0;
  }

  /* time block */
  .sheet-time-block {
    background:rgba(200,169,74,.08); border:1px solid rgba(200,169,74,.18);
    border-radius:12px; padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .sheet-time-big { font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--gold-light); line-height:1; }
  .sheet-time-right { text-align:right; }
  .sheet-time-tz   { font-size:11px; color:var(--text-muted); font-weight:600; }
  .sheet-time-date { font-size:12px; color:var(--text-dim); margin-top:2px; }

  /* info rows */
  .sheet-info-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    margin-bottom:20px;
  }
  .sheet-info-card {
    background:rgba(255,255,255,.04); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px;
  }
  .sic-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.08em; font-weight:600; margin-bottom:4px; }
  .sic-value { font-size:13px; font-weight:600; color:var(--text); line-height:1.3; }
  .sic-sub   { font-size:11px; color:var(--text-muted); margin-top:2px; }

  /* broadcast section */
  .sheet-section-title {
    font-size:11px; font-weight:700; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:.1em;
    margin-bottom:10px;
  }
  .sheet-broadcast-list { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
  .sbl-item {
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,.04); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px;
  }
  .sbl-icon { font-size:20px; flex-shrink:0; }
  .sbl-info { flex:1; min-width:0; }
  .sbl-name { font-size:13px; font-weight:700; color:var(--text); }
  .sbl-detail { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .sbl-type { flex-shrink:0; }

  /* close button */
  .sheet-close {
    width:100%; padding:14px; margin-top:4px;
    background:rgba(255,255,255,.06); border:1px solid var(--border);
    border-radius:12px; color:var(--text-muted);
    font-size:14px; font-weight:600; font-family:'Inter',sans-serif;
    cursor:pointer; transition:background .15s;
  }
  .sheet-close:hover { background:rgba(255,255,255,.1); }

  /* ── Live indicators ── */
  .live-pulse {
    display:inline-block; width:7px; height:7px; border-radius:50%;
    background:#ff4040; flex-shrink:0;
    animation: pulse 1.2s ease-in-out infinite;
    margin-right:2px;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.4; transform:scale(1.4); }
  }
  .live-min-badge {
    font-size:9px; font-weight:700; color:#ff6060;
    margin-top:3px; white-space:nowrap; text-align:center;
  }
  .done-badge {
    font-size:9px; font-weight:600; color:var(--text-dim);
    margin-top:3px; text-align:center; letter-spacing:.04em;
  }
  .live-badge {
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; padding:5px 10px; border-radius:8px;
    border:1px solid; margin-bottom:10px; font-weight:600;
  }


  /* ── DATE NAV BAR ── */
  .date-nav {
    display:flex; align-items:center;
    background:rgba(4,8,15,.96);
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(16px);
    padding:0 8px;
    gap:4px;
    position:sticky; top:0; z-index:99;
  }
  .dnav-arrow {
    background:none; border:none; color:var(--text-muted);
    font-size:24px; padding:8px 10px; cursor:pointer;
    flex-shrink:0; transition:color .15s; line-height:1;
    -webkit-tap-highlight-color:transparent;
  }
  .dnav-arrow:hover { color:var(--text); }
  .dnav-arrow:disabled { opacity:.2; cursor:default; }
  .dnav-scroll {
    display:flex; gap:6px; overflow-x:auto; flex:1;
    padding:10px 4px; scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .dnav-scroll::-webkit-scrollbar { display:none; }
  .dnav-pill {
    flex-shrink:0; display:flex; flex-direction:column; align-items:center;
    gap:2px; padding:6px 12px; border-radius:10px; cursor:pointer;
    border:1px solid transparent; transition:all .18s;
    background:none; font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent; min-width:52px;
  }
  .dnav-pill:hover { background:rgba(255,255,255,.06); }
  .dnav-pill.active {
    background:var(--blue); border-color:var(--blue);
  }
  .dnav-pill.today:not(.active) {
    border-color:rgba(200,169,74,.5);
  }
  .dnav-pill.has-live:not(.active) .dnav-dd::after {
    content:''; display:inline-block; width:5px; height:5px;
    background:#ff4040; border-radius:50%; margin-left:4px;
    vertical-align:middle; animation:pulse 1.2s ease-in-out infinite;
  }
  .dnav-dd {
    font-family:'Bebas Neue',sans-serif; font-size:20px;
    color:var(--text); line-height:1;
  }
  .dnav-pill.active .dnav-dd { color:#fff; }
  .dnav-mo {
    font-size:9px; color:var(--text-dim); text-transform:uppercase;
    letter-spacing:.07em; font-weight:600;
  }
  .dnav-pill.active .dnav-mo { color:rgba(255,255,255,.7); }
  .dnav-pill.today:not(.active) .dnav-dd { color:var(--gold-light); }


  /* ── BOTTOM TAB BAR ── */
  .tab-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:150;
    background:rgba(10,16,28,.97);
    border-top:1px solid var(--border);
    backdrop-filter:blur(20px);
    display:flex;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:10px 0 8px; background:none; border:none; cursor:pointer;
    font-family:'Inter',sans-serif; color:var(--text-dim);
    transition:color .18s; -webkit-tap-highlight-color:transparent;
  }
  .tab-btn.active { color:var(--blue-bright); }
  .tab-btn svg { width:22px; height:22px; }
  .tab-btn span { font-size:10px; font-weight:600; letter-spacing:.04em; }

  /* ── PAGES ── */
  .page { display:none; }
  .page.active { display:block; }
  /* extra bottom padding so content doesn't hide behind tab bar */
  .content, .bracket-page { padding-bottom:calc(80px + env(safe-area-inset-bottom)); }

  /* ── BRACKET PAGE ── */
  .bracket-page { padding:20px 16px; max-width:1000px; margin:0 auto; }
  .bracket-page h2 {
    font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:.08em;
    color:var(--gold-light); margin-bottom:4px;
  }
  .bracket-sub { font-size:12px; color:var(--text-dim); margin-bottom:24px; }

  /* Group table */
  .groups-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:12px; margin-bottom:32px;
  }
  .group-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }
  .group-card-header {
    display:flex; align-items:center; gap:8px;
    padding:10px 14px;
    border-bottom:1px solid var(--border);
  }
  .group-letter {
    font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.06em;
    color:#fff; width:26px; height:26px; border-radius:6px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .group-card-title { font-size:12px; color:var(--text-muted); font-weight:600; letter-spacing:.04em; }
  .group-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .group-table { width:100%; border-collapse:collapse; min-width:280px; }
  .group-table th {
    font-size:9px; color:var(--text-dim); font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; padding:6px 8px; text-align:right; white-space:nowrap;
  }
  .group-table th:first-child  { text-align:left; width:20px; }
  .group-table th:nth-child(2) { text-align:left; }
  .group-table td {
    padding:8px 8px; font-size:12px; color:var(--text); text-align:right;
    border-top:1px solid rgba(255,255,255,.04); white-space:nowrap;
  }
  .group-table td:first-child  { text-align:left; padding-left:12px; }
  .group-table td:nth-child(2) { text-align:left; padding-left:4px; }
  .group-table td:last-child   { padding-right:12px; }
  .group-table tr.qualified td { color:var(--text); }
  .group-table tr.qualified td:nth-child(2) { font-weight:700; }
  .gt-team { display:flex; align-items:center; gap:7px; }
  .gt-flag { font-size:16px; }
  .gt-name { font-size:12px; font-weight:600; }
  .gt-pts { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--gold-light); }
  .gt-pos {
    width:18px; height:18px; border-radius:4px; font-size:10px; font-weight:700;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    color:rgba(255,255,255,.5);
  }
  .gt-pos.q1 { background:rgba(26,111,212,.3); color:var(--blue-bright); }
  .gt-pos.q2 { background:rgba(26,111,212,.18); color:var(--blue-bright); }
  .gt-pos.q3 { background:rgba(200,169,74,.15); color:var(--gold-light); }

  /* Knockout bracket */
  .bracket-section-title {
    font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.1em;
    color:var(--gold); margin-bottom:12px;
    display:flex; align-items:center; gap:10px;
  }
  .bracket-section-title::after { content:''; flex:1; height:1px; background:rgba(200,169,74,.2); }
  .knockout-grid {
    display:flex; flex-direction:column; gap:8px; margin-bottom:32px;
  }
  .ko-match {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; overflow:hidden;
    display:grid; grid-template-columns:1fr auto 1fr;
    align-items:stretch;
  }
  .ko-match.finished { border-color:rgba(255,255,255,.12); }
  .ko-match.live { border-color:#ff4040; }
  .ko-team {
    display:flex; align-items:center; gap:8px;
    padding:12px 14px; font-size:13px; font-weight:600;
  }
  .ko-team.right { flex-direction:row-reverse; text-align:right; }
  .ko-team.winner { color:var(--gold-light); }
  .ko-team.loser  { color:var(--text-dim); }
  .ko-flag { font-size:20px; flex-shrink:0; }
  .ko-center {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:8px 10px; border-left:1px solid var(--border); border-right:1px solid var(--border);
    min-width:56px;
  }
  .ko-score {
    font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--text);
    line-height:1; letter-spacing:.04em;
  }
  .ko-score.live { color:#ff6060; }
  .ko-time { font-size:9px; color:var(--text-dim); margin-top:2px; text-align:center; }


  /* ── COUNTDOWN ── */
  .countdown-block {
    margin:0 auto 24px; max-width:360px;
    background:rgba(26,111,212,.12); border:1px solid rgba(26,111,212,.25);
    border-radius:16px; padding:18px 24px; text-align:center;
  }
  .cd-label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; font-weight:600; margin-bottom:6px; }
  .cd-timer {
    font-family:'Bebas Neue',sans-serif; font-size:52px;
    color:var(--gold-light); letter-spacing:.06em; line-height:1;
    margin-bottom:8px;
  }
  .cd-timer.live { color:#ff6060; font-size:32px; }
  .cd-match { font-size:13px; color:var(--text-muted); line-height:1.4; }
  .cd-match strong { color:var(--text); font-weight:700; }
  .cd-channel { display:inline-flex; align-items:center; gap:4px; margin-top:6px; font-size:11px; }

  /* ── STAR FAVORITE ── */
  .match-card { position:relative; }

  /* ── IN-APP NOTIFICATION BANNER ── */
  .notif-banner {
    position:fixed; top:calc(16px + env(safe-area-inset-top)); left:16px; right:16px;
    z-index:300; border-radius:14px;
    background:rgba(13,21,32,.97); border:1px solid var(--blue);
    box-shadow:0 8px 32px rgba(0,0,0,.6);
    padding:14px 16px;
    display:flex; align-items:flex-start; gap:12px;
    transform:translateY(-120%); opacity:0;
    transition:transform .35s cubic-bezier(.32,0,.15,1), opacity .35s;
  }
  .notif-banner.show { transform:translateY(0); opacity:1; }
  .notif-icon { font-size:28px; flex-shrink:0; margin-top:2px; }
  .notif-body { flex:1; min-width:0; }
  .notif-title { font-size:14px; font-weight:700; color:var(--text); margin-bottom:3px; }
  .notif-sub   { font-size:12px; color:var(--text-muted); line-height:1.4; }
  .notif-close {
    background:none; border:none; color:var(--text-dim);
    font-size:18px; cursor:pointer; padding:2px 4px; flex-shrink:0;
    font-family:'Inter',sans-serif;
  }

  /* ── FAV FILTER CHIP ── */
  .fav-pill {
    display:none; align-items:center; gap:5px;
    background:rgba(200,169,74,.15); border:1px solid rgba(200,169,74,.35);
    border-radius:100px; padding:6px 14px; font-size:12px; font-weight:600;
    color:var(--gold-light); cursor:pointer; white-space:nowrap;
    transition:all .18s;
  }
  .fav-pill.visible { display:inline-flex; }
  .fav-pill.active  { background:rgba(200,169,74,.3); border-color:var(--gold-light); }

  /* ── FAVS PAGE ── */
  .favs-page { padding:20px 16px; max-width:600px; margin:0 auto;
    padding-bottom:calc(80px + env(safe-area-inset-bottom)); }

  .favs-onboarding {
    background:linear-gradient(135deg,rgba(200,169,74,.12) 0%,rgba(26,111,212,.12) 100%);
    border:1px solid rgba(200,169,74,.3);
    border-radius:16px; padding:20px; margin-bottom:24px; text-align:center;
  }
  .favs-onboarding-icon { font-size:40px; margin-bottom:10px; }
  .favs-onboarding h3  { font-size:16px; font-weight:700; color:var(--gold-light); margin-bottom:6px; }
  .favs-onboarding p   { font-size:13px; color:var(--text-muted); line-height:1.5; }

  .favs-section-title {
    font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:.1em;
    color:var(--text-dim); text-transform:uppercase; margin-bottom:10px; margin-top:20px;
  }
  .country-grid {
    display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:8px;
  }
  .country-chip {
    display:flex; align-items:center; gap:10px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px;
    cursor:pointer; transition:all .18s; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .country-chip:hover  { border-color:rgba(255,255,255,.2); background:var(--surface2); }
  .country-chip.active {
    background:rgba(200,169,74,.15); border-color:rgba(200,169,74,.5);
  }
  .country-chip-flag { font-size:26px; flex-shrink:0; }
  .country-chip-name { font-size:13px; font-weight:600; color:var(--text); line-height:1.2; flex:1; }
  .country-chip-check {
    width:20px; height:20px; border-radius:50%; flex-shrink:0;
    border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center;
    font-size:11px; color:transparent; transition:all .18s;
  }
  .country-chip.active .country-chip-check {
    background:var(--gold); border-color:var(--gold); color:#000;
  }

  .favs-selected-banner {
    background:rgba(200,169,74,.12); border:1px solid rgba(200,169,74,.3);
    border-radius:10px; padding:10px 14px; font-size:12px; color:var(--gold-light);
    margin-bottom:16px; display:none; align-items:center; gap:8px;
  }
  .favs-selected-banner.visible { display:flex; }
  @media(max-width:480px){
    .groups-grid { grid-template-columns:1fr; }
    .ko-team { padding:10px 10px; font-size:12px; }
    .ko-flag  { font-size:16px; }
  }
  @media (max-width:580px) {
    .mc-top { padding-right:24px; }
    .mc-teams { font-size:13px; }
    .mc-flag  { font-size:15px; }
    .mc-time-val { font-size:19px; }
    .sheet-flag  { font-size:36px; }
    .sheet-info-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-badge">Copa del Mundo 2026</div>
  <h1>FIFA WORLD<br>CUP 2026</h1>
  <p class="hero-sub">11 Jun — 19 Jul &nbsp;·&nbsp; USA · México · Canadá</p>
  <div id="countdownBlock" class="countdown-block" style="display:none">
    <div class="cd-label" id="cdLabel">Próximo partido en</div>
    <div class="cd-timer" id="cdTimer">--:--:--</div>
    <div class="cd-match" id="cdMatch"></div>
  </div>
  <div class="hero-stats">
    <div class="stat"><div class="stat-n">48</div><div class="stat-l">Equipos</div></div>
    <div class="stat"><div class="stat-n">104</div><div class="stat-l">Partidos</div></div>
    <div class="stat"><div class="stat-n">16</div><div class="stat-l">Estadios</div></div>
    <div class="stat"><div class="stat-n">39</div><div class="stat-l">Días</div></div>
  </div>
</div>

<!-- TOOLBAR -->
<!-- TOP BAR: search + filter btn (NOT sticky) -->
<div class="topbar">
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar equipo, estadio, ciudad…">
  </div>
  <button class="filter-fab" id="filterBtn" onclick="openFilters()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>

// ── CARD BUILDER ────────────────────────────────────────────────────
function buildCard(m){
  const gc  = getGC(m);
  const bc  = getBroadcast(m);
  const ld  = liveData[m.matchNum] || {};
  const isLive = STATUS_LIVE.has(ld.status);
  const isDone = STATUS_DONE.has(ld.status);

  // Resolved names (API overrides placeholders in knockouts)
  const homeN = resolveTeam(m.matchNum,'home',m.home);
  const awayN = resolveTeam(m.matchNum,'away',m.away||'');

  // Score display
  const hasScore = (ld.scoreH !== null && ld.scoreA !== null && ld.scoreH !== undefined);
  const scoreStr = hasScore ? `${ld.scoreH}–${ld.scoreA}` : '';

  // mini dots
  const dots = bc.map(b=>`<span class="dot-chip" style="background:${b.cls==='ch-free'?'#3dd68c':b.cls==='ch-cable'?'#5aa0ff':'#e8c96a'}"></span>`).join('');

  const tLeft  = m.away!==undefined
    ? `<span class="mc-flag">${getFlag(homeN)}</span><span class="mc-team">${homeN}</span>`
    : `<span class="mc-team">${homeN}</span>`;
  const tRight = m.away!==undefined && m.away!==''
    ? (hasScore
        ? `<span class="mc-score-big">${scoreStr}</span><span class="mc-team right">${awayN}</span><span class="mc-flag">${getFlag(awayN)}</span>`
        : `<span class="mc-vs">VS</span><span class="mc-team right">${awayN}</span><span class="mc-flag">${getFlag(awayN)}</span>`)
    : (hasScore ? `<span class="mc-score-big">${scoreStr}</span>` : '');

  const gBadge = m.group
    ? `<span class="mc-group-badge" style="background:${gc}">Gpo. ${m.group}</span>`
    : `<span class="mc-group-badge" style="background:${gc};opacity:.75">${STAGE_LABELS[m.stage]||''}</span>`;

  // Live pulse dot
  const livePulse = isLive ? `<span class="live-pulse"></span>` : '';
  const statusBadge = isDone ? `<span class="done-badge">Final</span>` : (isLive ? `<span class="live-min-badge">🔴${ld.minute?ld.minute+"'":''}</span>` : '');

  const borderColor = isLive ? '#ff4040' : isDone ? 'rgba(255,255,255,.18)' : '';
  const cardStyle = `--group-color:${gc}${borderColor ? ';border-color:'+borderColor : ''}`;

  return `<div class="match-card" style="${cardStyle}" data-idx="${m.matchNum}" data-stage="${m.stage}" data-country="${countryOf(m.city)}" data-search="${[homeN,awayN,m.venue,m.city,m.group||''].join(' ').toLowerCase()}">
    <div class="mc-time">
      <div class="mc-time-val">${fmtTime(m.time)}</div>
      <div class="mc-time-tz">CT·MX</div>
      ${statusBadge}
    </div>
    <div class="mc-top"><div class="mc-teams">${tLeft}${tRight}</div>${gBadge}</div>
    <div class="mc-bottom">
      <span class="mc-venue">📍 ${m.venue}</span>
      <div class="mc-chips-mini">${livePulse}${dots}</div>
    </div>
  </div>`;
}

// ── RENDER LIST ─────────────────────────────────────────────────────
let activeStage='all', activeCountry=null, searchTerm='', favOnly=false;

function render(){
  const container = document.getElementById('scheduleContainer');
  const empty     = document.getElementById('emptyState');

  let filtered = MATCHES.filter(m=>{
    const homeN = resolveTeam(m.matchNum,'home',m.home);
    const awayN = resolveTeam(m.matchNum,'away',m.away||'');
    // Fav-only filter
    if(favOnly && !favorites.has(homeN) && !favorites.has(awayN)) return false;
    // Date filter
    if(activeDate && activeStage==='all' && !searchTerm && !activeCountry && !favOnly){
      if(m.date !== activeDate) return false;
    }
    if(activeStage!=='all'&&m.stage!==activeStage) return false;
    if(activeCountry&&countryOf(m.city)!==activeCountry) return false;
    if(searchTerm){
      const hay=[homeN,awayN,m.venue,m.city,m.group||'',STAGE_LABELS[m.stage]||''].join(' ').toLowerCase();
      if(!hay.includes(searchTerm.toLowerCase())) return false;
    }
    return true;
  });

  if(!filtered.length){ container.innerHTML=''; empty.classList.remove('no-results'); return; }
  empty.classList.add('no-results');

  const byDate={};
  filtered.forEach(m=>{ if(!byDate[m.date]) byDate[m.date]={day:m.day,matches:[]}; byDate[m.date].matches.push(m); });

  let html='', lastStage=null;
  Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,{day,matches:ms}])=>{
    const s=ms[0].stage;
    if(s!==lastStage){
      html+=`<div class="stage-header"><div class="stage-title">${STAGE_LABELS[s]||s}</div><div class="stage-line"></div></div>`;
      lastStage=s;
    }
    const [,mo,dd]=date.split('-').map(Number);
    html+=`<div class="date-group">`;
    html+=`<div class="date-label"><span class="date-label-day">${day}</span><span class="date-label-text">${dd} de ${MONTHS_FULL[mo]}</span><div class="date-label-line"></div></div>`;
    ms.forEach(m=>{ html+=buildCard(m); });
    html+=`</div>`;
  });
  container.innerHTML=html;
}

function addHour(t, n){
  const [h,m]=t.split(':').map(Number);
  const nh=(h+n)%24;
  return `${nh%12||12}:${String(m).padStart(2,'0')} ${nh>=12?'PM':'AM'}`;
}

function closeSheet(){
  overlay.classList.remove('open');
  sheet.classList.remove('open');
  document.body.style.overflow='';
}

// ── TOUCH DRAG TO DISMISS ────────────────────────────────────────────
let dragStart=null, dragging=false;
function onTouchStart(e){
  dragStart=e.touches[0].clientY;
  dragging=true;
  sheet.style.transition='none';
}
function onTouchMove(e){
  if(!dragging) return;
  const dy=e.touches[0].clientY-dragStart;
  if(dy>0) sheet.style.transform=`translateY(${dy}px)`;
}
function onTouchEnd(e){
  dragging=false;
  sheet.style.transition='transform .35s cubic-bezier(.32,0,.15,1)';
  const dy=e.changedTouches[0].clientY-dragStart;
  if(dy>100){ closeSheet(); sheet.style.transform=''; }
  else { sheet.style.transform='translateY(0)'; }
}
handle.addEventListener('touchstart',onTouchStart,{passive:true});
handle.addEventListener('touchmove', onTouchMove, {passive:true});
handle.addEventListener('touchend',  onTouchEnd,  {passive:true});

overlay.addEventListener('click', closeSheet);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSheet(); });

// ── DATE NAV ─────────────────────────────────────────────────────────
// Get sorted unique dates from MATCHES
const ALL_DATES = [...new Set(MATCHES.map(m=>m.date))].sort();
const MONTHS_SHORT = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// Active date filter: null = show all
let activeDate = null;

function todayStr(){
  // Today in CT (UTC-5, no DST adjustment — close enough for this use)
  const now = new Date();
  const ct  = new Date(now.getTime() - (5*60*60*1000)); // rough CT
  return ct.toISOString().slice(0,10);
}

function initDateNav(){
  const today   = todayStr();
  // Default: today if it has matches, else first match date (Jun 11)
  const hasToday = ALL_DATES.includes(today);
  activeDate = hasToday ? today : ALL_DATES[0];

  buildDatePills();
  scrollToActive();
}

function buildDatePills(){
  const scroll = document.getElementById('dnavScroll');
  const today  = todayStr();
  scroll.innerHTML = '';
  ALL_DATES.forEach(d => {
    const [,mo,dd] = d.split('-').map(Number);
    const isToday  = d === today;
    const isActive = d === activeDate;
    const hasLive  = Object.values(liveData).some(ld =>
      STATUS_LIVE.has(ld.status) && MATCHES.find(m=>m.matchNum===parseInt(Object.keys(liveData).find(k=>liveData[k]===ld)))?.date===d
    );
    const btn = document.createElement('button');
    btn.className = 'dnav-pill' + (isActive?' active':'') + (isToday?' today':'') + (hasLive?' has-live':'');
    btn.dataset.date = d;
    btn.innerHTML = '<span class="dnav-dd">'+dd+'</span><span class="dnav-mo">'+MONTHS_SHORT[mo]+'</span>';
    btn.addEventListener('click', ()=>{ setActiveDate(d); });
    scroll.appendChild(btn);
  });
  // Prev / next arrow state
  const idx = ALL_DATES.indexOf(activeDate);
  document.getElementById('dnavPrev').disabled = idx <= 0;
  document.getElementById('dnavNext').disabled = idx >= ALL_DATES.length-1;
}

function setActiveDate(d){
  activeDate = d;
  buildDatePills();
  scrollToActive();
  render();
  // Scroll content to top
  window.scrollTo({top:0, behavior:'smooth'});
}

function shiftDate(delta){
  const idx = ALL_DATES.indexOf(activeDate);
  const next = idx + delta;
  if(next >= 0 && next < ALL_DATES.length) setActiveDate(ALL_DATES[next]);
}

function scrollToActive(){
  const scroll = document.getElementById('dnavScroll');
  const active = scroll.querySelector('.dnav-pill.active');
  if(active) active.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
}

document.getElementById('stageFilters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-stage]'); if(!btn) return;
  document.querySelectorAll('[data-stage]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeStage=btn.dataset.stage;
  if(activeStage !== 'all'){ activeDate = null; buildDatePills(); }
  updateFilterBtn();
  render();
});
document.getElementById('countryFilters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-country]'); if(!btn) return;
  document.querySelectorAll('[data-country]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCountry = btn.dataset.country === 'all' ? null : btn.dataset.country;
  if(activeCountry){ activeDate = null; buildDatePills(); }
  updateFilterBtn();
  render();
});
let st;

// ══════════════════════════════════════════════════════
//  LIVE DATA — football-data.org (free tier, WC = 2026)
//  Docs: https://www.football-data.org/documentation/quickstart
//  No API key required for the World Cup on the free tier.
//  Rate limit: 10 req/min  → we poll every 60s live, 5min idle
// ══════════════════════════════════════════════════════

const API_BASE = 'https://api.football-data.org/v4';
// Competition WC = FIFA World Cup. Season 2026.
const WC_CODE  = 'WC';

// ── State overlay: matchNum → live data from API
// Structure: { score:{home,away}, status, homeTeam, awayTeam }
const liveData = {};

// ── Status map → legible label
const STATUS_LABEL = {
  SCHEDULED:'Programado', TIMED:'Programado', IN_PLAY:'🔴 En vivo',
  PAUSED:'Medio tiempo', FINISHED:'Final', POSTPONED:'Pospuesto',
  CANCELLED:'Cancelado', SUSPENDED:'Suspendido', AWARDED:'Adjudicado',
};
const STATUS_LIVE   = new Set(['IN_PLAY','PAUSED']);
const STATUS_DONE   = new Set(['FINISHED','AWARDED']);

// ── Map API team names → our FLAGS keys (best-effort fuzzy)
const NAME_MAP = {
  'Mexico':'México','South Africa':'South Africa','Korea Republic':'South Korea',
  'Czechia':'Czechia','Canada':'Canada','Bosnia-Herzegovina':'Bosnia & Herzegovina',
  'United States':'USA','Paraguay':'Paraguay','Qatar':'Qatar','Switzerland':'Switzerland',
  'Brazil':'Brazil','Morocco':'Morocco','Haiti':'Haiti','Scotland':'Scotland',
  'Australia':'Australia','Türkiye':'Türkiye','Germany':'Germany','Curaçao':'Curaçao',
  'Netherlands':'Netherlands','Japan':'Japan',"Côte d'Ivoire":'Ivory Coast',
  'Ecuador':'Ecuador','Sweden':'Sweden','Tunisia':'Tunisia','Spain':'Spain',
  'Cape Verde':'Cape Verde','Belgium':'Belgium','Egypt':'Egypt',
  'Saudi Arabia':'Saudi Arabia','Uruguay':'Uruguay','IR Iran':'Iran',
  'New Zealand':'New Zealand','France':'France','Senegal':'Senegal',
  'Iraq':'Iraq','Norway':'Norway','Argentina':'Argentina','Algeria':'Algeria',
  'Austria':'Austria','Jordan':'Jordan','Portugal':'Portugal',
  'DR Congo':'DR Congo','England':'England','Croatia':'Croatia',
  'Ghana':'Ghana','Panama':'Panama','Uzbekistan':'Uzbekistan','Colombia':'Colombia',
};
function mapName(n){ return NAME_MAP[n] || n; }

// ── Fetch all WC matches from API
async function fetchMatches(){
  // CORS proxy chain — tries each in order until one works
  const TARGET = `${API_BASE}/competitions/${WC_CODE}/matches`;
  const PROXIES = [
    // allorigins — wraps response in {contents: "..."}
    { url: `https://api.allorigins.win/get?url=${encodeURIComponent(TARGET)}`, unwrap: true },
    // corsproxy.io — transparent passthrough
    { url: `https://corsproxy.io/?${encodeURIComponent(TARGET)}`, unwrap: false },
    // direct — works when hosted on a real domain (no CORS issue)
    { url: TARGET, unwrap: false },
  ];

  let data = null;
  for(const proxy of PROXIES){
    try {
      const res = await fetch(proxy.url, { signal: AbortSignal.timeout(8000) });
      if(!res.ok) continue;
      const raw = await res.json();
      data = proxy.unwrap ? JSON.parse(raw.contents) : raw;
      if(data && data.matches) break; // success
      data = null;
    } catch(e){ continue; }
  }

  if(!data){ return; } // proxies unavailable — will retry on next poll

  try {
    let changed = false;

    for(const m of (data.matches||[])){
      // Match our matchNum by matchday + home team name combo
      const homeNorm = mapName(m.homeTeam?.name||'');
      const awayNorm = mapName(m.awayTeam?.name||'');
      const status   = m.status;
      const scoreH   = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? null;
      const scoreA   = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? null;

      // Find matching entry in our MATCHES array
      const local = MATCHES.find(lm =>
        lm.home === homeNorm || lm.away === homeNorm ||
        lm.home === awayNorm || lm.away === awayNorm ||
        // For knockout rounds, match by approximate date
        (lm.date === m.utcDate?.slice(0,10))
      );
      if(!local) continue;

      const key = local.matchNum;
      const prev = liveData[key]||{};
      const next = {
        status,
        scoreH, scoreA,
        homeTeam: homeNorm || prev.homeTeam,
        awayTeam: awayNorm || prev.awayTeam,
        minute: m.minute || null,
      };

      // Check if anything changed
      if(JSON.stringify(prev)!==JSON.stringify(next)){
        liveData[key] = next;
        changed = true;
      }
    }

    if(changed){
      render();
      // Rebuild bracket if visible
      if(document.getElementById('page-bracket').classList.contains('active')) renderBracket();
      buildDatePills(); // refresh live dots on date pills
    }
  } catch(e){
    // parse error — ignore silently
  }
}

// ── Polling: 60s during live match, 5min otherwise
let pollTimer = null;
function isAnyMatchLive(){
  return Object.values(liveData).some(d => STATUS_LIVE.has(d.status));
}
function schedulePoll(){
  clearTimeout(pollTimer);
  const delay = isAnyMatchLive() ? 60_000 : 300_000;
  pollTimer = setTimeout(()=>{ fetchMatches().then(schedulePoll); }, delay);
}

// ── Inject live score into a card's HTML
// Called from buildCard() — returns the score badge HTML or ''
function scoreBadge(matchNum){
  const d = liveData[matchNum];
  if(!d) return '';
  const isLive = STATUS_LIVE.has(d.status);
  const isDone = STATUS_DONE.has(d.status);
  if(!isLive && !isDone) return '';

  const scoreStr = (d.scoreH !== null && d.scoreA !== null)
    ? `${d.scoreH} – ${d.scoreA}` : '– –';
  const minStr = isLive && d.minute ? ` ${d.minute}'` : '';
  const label  = STATUS_LABEL[d.status] || d.status;

  const bg  = isLive
    ? 'background:rgba(255,60,60,.15);border-color:rgba(255,60,60,.35);color:#ff6060'
    : 'background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);color:var(--text-muted)';

  return `<span class="live-badge" style="${bg}">${isLive?'🔴 ':''}<strong>${scoreStr}</strong>${minStr} <span style="font-size:9px;opacity:.7">${label}</span></span>`;
}

// ── Override team names in knockout rounds from API data
function resolveTeam(matchNum, side, fallback){
  const d = liveData[matchNum];
  if(!d) return fallback;
  if(side==='home' && d.homeTeam && !d.homeTeam.startsWith('Ganador') && !d.homeTeam.startsWith('Campeón'))
    return d.homeTeam;
  if(side==='away' && d.awayTeam && !d.awayTeam.startsWith('Ganador') && !d.awayTeam.startsWith('Campeón'))
    return d.awayTeam;
  return fallback;
}

// ── Kick off on load
fetchMatches().then(schedulePoll);

// ── SWIPE TO CHANGE DATE ─────────────────────────────────────────────
(function(){
  let sx=0, sy=0, sTime=0;
  const el = document.getElementById('scheduleContainer');
  const body = document.body;

  body.addEventListener('touchstart', e=>{
    // Don't hijack sheet drags or scrollable date nav
    if(e.target.closest('.sheet,.date-nav,.toolbar')) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    sTime = Date.now();
  }, {passive:true});

  body.addEventListener('touchend', e=>{
    if(e.target.closest('.sheet,.date-nav,.toolbar')) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    const dt = Date.now() - sTime;
    // Horizontal swipe: at least 60px, faster than 400ms, more horizontal than vertical
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5 && dt < 400){
      // swipe left = next date, swipe right = prev date
      const delta = dx < 0 ? 1 : -1;
      const idx = ALL_DATES.indexOf(activeDate);
      const next = idx + delta;
      if(next >= 0 && next < ALL_DATES.length){
        // Animate content slide
        const dir = delta > 0 ? '-60px' : '60px';
        el.style.transition = 'opacity .15s,transform .15s';
        el.style.opacity = '0';
        el.style.transform = 'translateX('+dir+')';
        setTimeout(()=>{
          setActiveDate(ALL_DATES[next]);
          el.style.transition = 'none';
          el.style.opacity = '0';
          el.style.transform = 'translateX('+(delta>0?'60px':'-60px')+')';
          requestAnimationFrame(()=>{
            requestAnimationFrame(()=>{
              el.style.transition = 'opacity .2s,transform .2s';
              el.style.opacity = '1';
              el.style.transform = 'translateX(0)';
            });
          });
        }, 150);
      }
    }
  }, {passive:true});
})();

// Build standings from liveData + MATCHES results
function computeStandings(){
  // standings[team] = {w,d,l,gf,ga,pts}
  const st = {};
  const init = (t) => { if(!st[t]) st[t]={w:0,d:0,l:0,gf:0,ga:0,pts:0}; };

  MATCHES.forEach(m => {
    if(m.stage!=='groups') return;
    const ld = liveData[m.matchNum];
    if(!ld || !STATUS_DONE.has(ld.status)) return;
    if(ld.scoreH===null||ld.scoreA===null) return;

    const home = resolveTeam(m.matchNum,'home',m.home);
    const away = resolveTeam(m.matchNum,'away',m.away||'');
    init(home); init(away);

    st[home].gf += ld.scoreH; st[home].ga += ld.scoreA;
    st[away].gf += ld.scoreA; st[away].ga += ld.scoreH;

    if(ld.scoreH > ld.scoreA){
      st[home].w++; st[home].pts+=3; st[away].l++;
    } else if(ld.scoreH < ld.scoreA){
      st[away].w++; st[away].pts+=3; st[home].l++;
    } else {
      st[home].d++; st[home].pts+=1; st[away].d++; st[away].pts+=1;
    }
  });
  return st;
}

// Group teams by group letter
function buildGroupMap(){
  const gm = {};
  MATCHES.forEach(m=>{
    if(!m.group) return;
    const g = m.group;
    if(!gm[g]) gm[g]=new Set();
    gm[g].add(resolveTeam(m.matchNum,'home',m.home));
    if(m.away) gm[g].add(resolveTeam(m.matchNum,'away',m.away));
  });
  return gm;
}

function renderGroupTables(st, groupMap){
  const GC_MAP = {A:'#e04040',B:'#e07830',C:'#d0b020',D:'#50b840',E:'#30a8c8',F:'#5870e8',G:'#9858e8',H:'#e848a8',I:'#48d0a8',J:'#e86848',K:'#a8c030',L:'#30b8e0'};
  let html = '<div class="groups-grid">';

  'ABCDEFGHIJKL'.split('').forEach(letter=>{
    const teams = [...(groupMap[letter]||new Set())];
    if(!teams.length) return;

    // Sort: pts desc → gd desc → gf desc → name
    teams.sort((a,b)=>{
      const sa=st[a]||{pts:0,gf:0,ga:0}, sb=st[b]||{pts:0,gf:0,ga:0};
      if(sb.pts!==sa.pts) return sb.pts-sa.pts;
      const gda=(sa.gf-sa.ga), gdb=(sb.gf-sb.ga);
      if(gdb!==gda) return gdb-gda;
      if(sb.gf!==sa.gf) return sb.gf-sa.gf;
      return a.localeCompare(b);
    });

    html += '<div class="group-card">';
    html += '<div class="group-card-header">';
    html += '<span class="group-letter" style="background:'+GC_MAP[letter]+'">'+letter+'</span>';
    html += '<span class="group-card-title">GRUPO '+letter+'</span>';
    html += '</div>';
    html += '<div class="group-table-wrap"><table class="group-table"><thead><tr>';
    html += '<th></th><th></th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GD</th><th>Pts</th>';
    html += '</tr></thead><tbody>';

    teams.forEach((team,i)=>{
      const s = st[team]||{w:0,d:0,l:0,gf:0,ga:0,pts:0};
      const pj = s.w+s.d+s.l;
      const gd = s.gf-s.ga;
      const gdStr = gd>0?'+'+gd:String(gd);
      const posClass = i===0?'gt-pos q1':i===1?'gt-pos q2':i===2?'gt-pos q3':'gt-pos';
      const rowClass = i<=1?'qualified':'';
      html += '<tr class="'+rowClass+'">';
      html += '<td><span class="'+posClass+'">'+(i+1)+'</span></td>';
      html += '<td><div class="gt-team"><span class="gt-flag">'+getFlag(team)+'</span><span class="gt-name">'+team+'</span></div></td>';
      html += '<td>'+pj+'</td><td>'+s.w+'</td><td>'+s.d+'</td><td>'+s.l+'</td>';
      html += '<td style="color:'+(gd>0?'#3dd68c':gd<0?'#ff6060':'var(--text-dim)')+'">'+gdStr+'</td>';
      html += '<td><span class="gt-pts">'+s.pts+'</span></td>';
      html += '</tr>';
    });

    html += '</tbody></table></div></div>';
  });

  html += '</div>';
  return html;
}

function renderKnockoutRound(label, matchNums){
  let html = '<div class="bracket-section-title">'+label+'</div>';
  html += '<div class="knockout-grid">';

  matchNums.forEach(n=>{
    const m = MATCHES.find(x=>x.matchNum===n);
    if(!m) return;
    const ld = liveData[n]||{};
    const isLive = STATUS_LIVE.has(ld.status);
    const isDone = STATUS_DONE.has(ld.status);
    const hasScore = isDone||isLive;

    const homeN = resolveTeam(n,'home',m.home);
    const awayN = resolveTeam(n,'away',m.away||'—');
    const homeWin = isDone && ld.scoreH > ld.scoreA;
    const awayWin = isDone && ld.scoreA > ld.scoreH;

    const scoreStr = hasScore && ld.scoreH!==null ? ld.scoreH+' – '+ld.scoreA : fmtTime(m.time);
    const scoreClass = 'ko-score'+(isLive?' live':'');
    const timeLabel = isLive ? '🔴 LIVE '+(ld.minute?ld.minute+"'":'') : (isDone?'Final':'CT '+fmtTime(m.time));

    const cardClass = 'ko-match'+(isLive?' live':isDone?' finished':'');

    html += '<div class="'+cardClass+'">';
    html += '<div class="ko-team'+(homeWin?' winner':isDone?' loser':'')+'">';
    html += '<span class="ko-flag">'+getFlag(homeN)+'</span>';
    html += '<span>'+homeN+'</span></div>';
    html += '<div class="ko-center">';
    html += '<span class="'+scoreClass+'">'+scoreStr+'</span>';
    html += '<span class="ko-time">'+timeLabel+'</span>';
    html += '</div>';
    html += '<div class="ko-team right'+(awayWin?' winner':isDone?' loser':'')+'">';
    html += '<span class="ko-flag">'+getFlag(awayN)+'</span>';
    html += '<span>'+awayN+'</span></div>';
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function renderBracket(){
  const container = document.getElementById('bracketContent');
  const st = computeStandings();
  const groupMap = buildGroupMap();
  const groupsPlayed = Object.values(st).length > 0;

  let html = '<h2>Clasificación Mundial 2026</h2>';
  html += '<p class="bracket-sub">Se actualiza automáticamente con los resultados — los 2 primeros de cada grupo + los 8 mejores terceros avanzan</p>';

  // Groups
  html += '<div class="bracket-section-title">Fase de Grupos</div>';
  html += renderGroupTables(st, groupMap);

  // Knockout rounds
  const rounds = [
    {label:'Ronda de 32',  nums:[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88]},
    {label:'Octavos de Final', nums:[89,90,91,92,93,94,95,96]},
    {label:'Cuartos de Final', nums:[97,98,99,100]},
    {label:'Semifinales',      nums:[101,102]},
    {label:'Tercer Lugar',     nums:[103]},
    {label:'⭐ Gran Final',    nums:[104]},
  ];

  rounds.forEach(r=>{
    html += renderKnockoutRound(r.label, r.nums);
  });

  container.innerHTML = html;
}

// ══════════════════════════════════════════════════════════════
//  COUNTDOWN — next upcoming match (of favs if any, else global)
// ══════════════════════════════════════════════════════════════
let cdInterval = null;

function getMatchDateTime(m){
  // Convert match date + CT time → UTC Date object
  // CT = UTC-5 (CDT in summer, close enough)
  const [y,mo,d] = m.date.split('-').map(Number);
  const [h,mi]   = m.time.split(':').map(Number);
  return new Date(Date.UTC(y, mo-1, d, h+5, mi)); // CT+5 = UTC
}

function findNextMatch(){
  const now = Date.now();
  // Priority: fav matches first, then any
  const pool = favorites.size > 0
    ? MATCHES.filter(m => favorites.has(resolveTeam(m.matchNum,'home',m.home)) || favorites.has(resolveTeam(m.matchNum,'away',m.away||'')))
    : MATCHES;

  const upcoming = pool
    .map(m => ({ m, dt: getMatchDateTime(m) }))
    .filter(({dt}) => dt.getTime() > now)
    .sort((a,b) => a.dt - b.dt);

  return upcoming[0] || null;
}

function updateCountdown(){
  const block = document.getElementById('countdownBlock');
  const timerEl = document.getElementById('cdTimer');
  const matchEl = document.getElementById('cdMatch');
  const labelEl = document.getElementById('cdLabel');

  const next = findNextMatch();
  if(!next){ block.style.display='none'; return; }

  block.style.display='block';
  const {m, dt} = next;
  const diff = dt.getTime() - Date.now();
  const homeN = resolveTeam(m.matchNum,'home',m.home);
  const awayN = resolveTeam(m.matchNum,'away',m.away||'');
  const bc    = getBroadcast(m);
  const freeBC = bc.find(b=>b.cls==='ch-free');
  const channelStr = freeBC ? freeBC.name.split('/')[0].trim() : bc[0]?.name || 'ViX';

  if(diff <= 0){
    timerEl.className = 'cd-timer live';
    timerEl.textContent = '¡EN VIVO!';
    labelEl.textContent = 'Partido en curso';
  } else {
    timerEl.className = 'cd-timer';
    labelEl.textContent = favorites.size > 0 ? 'Próximo partido favorito' : 'Próximo partido';
    const totalSec = Math.floor(diff/1000);
    const days = Math.floor(totalSec/86400);
    const hrs  = Math.floor((totalSec%86400)/3600);
    const mins = Math.floor((totalSec%3600)/60);
    const secs = totalSec % 60;
    if(days > 0){
      timerEl.textContent = days+'d ' + String(hrs).padStart(2,'0')+'h ' + String(mins).padStart(2,'0')+'m';
    } else {
      timerEl.textContent = String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    }
  }

  matchEl.innerHTML = '<strong>' + getFlag(homeN) + ' ' + homeN + ' vs ' + awayN + ' ' + getFlag(awayN) + '</strong>'
    + '<br>' + fmtTime(m.time) + ' CT &nbsp;·&nbsp; ' + m.date.slice(5).replace('-','/')
    + '<br><span class="cd-channel">📺 ' + channelStr + '</span>';
}

function startCountdown(){
  updateCountdown();
  clearInterval(cdInterval);
  cdInterval = setInterval(updateCountdown, 1000);
}

// ══════════════════════════════════════════════════════════════
//  IN-APP NOTIFICATIONS (30 min before fav matches)
// ══════════════════════════════════════════════════════════════
const NOTIF_KEY    = 'mundial2026_notified';
let notifiedSet    = new Set(JSON.parse(localStorage.getItem(NOTIF_KEY)||'[]'));
let notifTimer     = null;
let notifDismissTimer = null;

function saveNotified(){ localStorage.setItem(NOTIF_KEY, JSON.stringify([...notifiedSet])); }

function dismissNotif(){
  document.getElementById('notifBanner').classList.remove('show');
  clearTimeout(notifDismissTimer);
}

function showNotif(title, sub){
  const banner = document.getElementById('notifBanner');
  document.getElementById('notifTitle').textContent = title;
  document.getElementById('notifSub').textContent   = sub;
  banner.classList.add('show');
  clearTimeout(notifDismissTimer);
  notifDismissTimer = setTimeout(dismissNotif, 8000);
}

function checkNotifications(){
  if(favorites.size === 0) return;
  const now = Date.now();

  MATCHES.forEach(m => {
    const homeN = resolveTeam(m.matchNum,'home',m.home);
    const awayN = resolveTeam(m.matchNum,'away',m.away||'');
    if(!favorites.has(homeN) && !favorites.has(awayN)) return;

    const dt   = getMatchDateTime(m);
    const diff = dt.getTime() - now;
    const key  = 'notif_' + m.matchNum;

    // Fire between 31min and 29min before kickoff
    if(diff > 0 && diff <= 31*60*1000 && diff >= 29*60*1000 && !notifiedSet.has(key)){
      notifiedSet.add(key);
      saveNotified();
      const bc = getBroadcast(m);
      const freeBC = bc.find(b=>b.cls==='ch-free');
      const ch = freeBC ? freeBC.name.split('/')[0].trim() : (bc[0]?.name||'ViX');
      showNotif(
        '⚽ ' + getFlag(homeN) + ' ' + homeN + ' vs ' + awayN + ' ' + getFlag(awayN),
        'En 30 min · ' + fmtTime(m.time) + ' CT · ' + ch
      );
    }
  });
}

function scheduleNotifications(){
  clearInterval(notifTimer);
  if(favorites.size === 0) return;
  checkNotifications();
  notifTimer = setInterval(checkNotifications, 60_000); // check every minute
}

// ══════════════════════════════════════════════════════════════
//  FAVS PAGE — all 48 teams, grouped by continent
// ══════════════════════════════════════════════════════════════
// Flat sorted list of all 48 teams
const ALL_TEAMS_SORTED = [
  'Algeria','Argentina','Australia','Austria','Belgium','Bosnia & Herzegovina',
  'Brazil','Canada','Cape Verde','Colombia','Croatia','Curaçao','Czechia',
  'DR Congo','Ecuador','Egypt','England','France','Germany','Ghana',
  'Haiti','Iran','Iraq','Ivory Coast','Japan','Jordan','México',
  'Morocco','Netherlands','New Zealand','Norway','Panama','Paraguay',
  'Portugal','Qatar','Saudi Arabia','Scotland','Senegal','South Africa',
  'South Korea','Spain','Sweden','Switzerland','Tunisia','Türkiye',
  'Uruguay','USA','Uzbekistan',
];

function renderFavsPage(){
  const c = document.getElementById('favsContent');
  const favCount = favorites.size;

  let html = '';

  // Onboarding banner
  html += '<div class="favs-onboarding">'
    + '<div class="favs-onboarding-icon">⭐</div>'
    + '<h3>Marca tus equipos favoritos</h3>'
    + '<p>Recibirás un recordatorio <strong>30 minutos antes</strong> de cada partido de los equipos que selecciones. Tus favoritos se guardan permanentemente en tu dispositivo.</p>'
    + '</div>';

  // Selected summary
  if(favCount > 0){
    const names = [...favorites].sort().join(', ');
    html += '<div class="favs-selected-banner visible">'
      + '⭐ ' + favCount + ' equipo' + (favCount>1?'s':'') + ' seleccionado' + (favCount>1?'s':'') + ': <strong>' + names + '</strong>'
      + '</div>';
  }

  // Render all teams alphabetically in a single grid
  html += '<div class="country-grid">';
  ALL_TEAMS_SORTED.forEach(norm=>{
    const isFav    = favorites.has(norm);
    const safeAttr = norm.replace(/"/g,'&quot;');
    html += '<div class="country-chip' + (isFav?' active':'') + '" data-team="' + safeAttr + '" onclick="handleChipClick(this)">'
      + '<span class="country-chip-flag">' + getFlag(norm) + '</span>'
      + '<span class="country-chip-name">' + norm + '</span>'
      + '<span class="country-chip-check">✓</span>'
      + '</div>';
  });
  html += '</div>';

  c.innerHTML = html;
}

function handleChipClick(el){
  const team = el.dataset.team;
  toggleFavTeam(team);
}

function toggleFavTeam(team){
  if(favorites.has(team)){
    favorites.delete(team);
  } else {
    favorites.add(team);
  }
  saveFavs();
  updateFavPill();
  startCountdown();
  scheduleNotifications();
  renderFavsPage();    // re-render chips
  // also update tab badge
  updateFavsTabBadge();
}

function updateFavsTabBadge(){
  const btn = document.getElementById('tab-favs');
  if(!btn) return;
  const n = favorites.size;
  // show dot on tab if favs exist
  const span = btn.querySelector('span');
  span.textContent = n > 0 ? 'Favoritos (' + n + ')' : 'Favoritos';
}

// hide reset btn initially
document.getElementById('resetBtn').style.display='none';
updateFavPill();
updateFavsTabBadge();
initDateNav();
render();
startCountdown();
scheduleNotifications();
</script>

<!-- ═══ Service Worker — offline cache ═══ -->
<script>
if ('serviceWorker' in navigator) {
  const SW_SRC = `
const CACHE = 'mundial2026-v1';
const FONTS = [
  'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap'
];
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(FONTS)).catch(()=>{})
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() =>
      new Response('', {status: 408})
    ))
  );
});
`;
  const blob = new Blob([SW_SRC], {type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url, {scope:'./'})
    .then(()=>{ URL.revokeObjectURL(url); })
    .catch(()=>{ URL.revokeObjectURL(url); });
}
</script>
